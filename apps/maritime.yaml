apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maritime-stateful
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Sylad/developpeur-gitops.git
    targetRevision: main
    path: charts/maritime-stateful
    helm:
      releaseName: maritime-stateful
  destination:
    server: https://kubernetes.default.svc
    namespace: maritime
  syncPolicy:
    automated:
      prune: false  # CNPG Cluster delete = data loss, on garde manuel
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply retiré 2026-05-17 : ArgoCD ne supporte pas la
      # combinaison Force+ServerSideApply (utilisée par les CNPG Cluster
      # CRDs lors du switch image). Erreur "error validating options:
      # --force cannot be used with --server-side". Le client-side apply
      # par défaut suffit pour CNPG ; pas de gros CRDs >256KB ici.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maritime
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Sylad/developpeur-gitops.git
    targetRevision: main
    path: charts/maritime
    helm:
      releaseName: maritime
  destination:
    server: https://kubernetes.default.svc
    namespace: maritime
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply retiré 2026-05-20 : récurrence du bug 2026-05-17 sur
      # maritime-stateful. ArgoCD utilise --force sur certaines ressources
      # (annotation sync-options Force=true sur Job PostSync ?) qui est
      # incompatible avec --server-side. Erreur "error validating options:
      # --force cannot be used with --server-side" sur 130 ressources.
      # Client-side apply par défaut suffit.
