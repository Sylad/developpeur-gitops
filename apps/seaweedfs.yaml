# SeaweedFS — S3-compatible storage in-cluster pour GWC tile cache.
# Backend du plugin GS gwc-s3 (sprint refacto archi 2026-05-16).
# Pourrait servir d'autres apps plus tard (autres caches, blob stores).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Sylad/developpeur-gitops.git
    targetRevision: main
    path: charts/seaweedfs
    helm:
      releaseName: seaweedfs
  destination:
    server: https://kubernetes.default.svc
    namespace: maritime
  syncPolicy:
    automated:
      prune: false   # StatefulSet PVC : delete = data loss (cache tile, à protéger)
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
