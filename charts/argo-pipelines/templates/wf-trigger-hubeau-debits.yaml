{{- if .Values.workflows.triggerHubeauDebits.enabled }}
# G12g-extension (2026-05-22) — hubeau-debits-fr (cron */15).
# Pattern identique à trigger-usgs-earthquakes (cf
# argo_workflows_orchestrator_migration_pattern.md).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: trigger-hubeau-debits
  namespace: argo
spec:
  schedules:
    - "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  workflowSpec:
    entrypoint: main
    serviceAccountName: argo-workflow
    activeDeadlineSeconds: 300
    ttlStrategy:
      secondsAfterCompletion: 86400
    arguments:
      parameters:
        - name: api-url
          value: {{ .Values.workflows.triggerHubeauDebits.apiUrl | quote }}
        - name: source-id
          value: {{ .Values.workflows.triggerHubeauDebits.sourceId | quote }}
    templates:
      - name: main
        steps:
          - - name: trigger
              template: post-trigger
      - name: post-trigger
        retryStrategy:
          limit: 2
          backoff: { duration: "10s", factor: 2 }
        container:
          image: {{ .Values.workflows.triggerHubeauDebits.image | quote }}
          command: [sh, -c]
          envFrom:
            - secretRef:
                name: {{ .Values.workflows.triggerHubeauDebits.secretName | quote }}
          args:
            - |
              URL="{{`{{workflow.parameters.api-url}}`}}/internal-trigger/sources/{{`{{workflow.parameters.source-id}}`}}"
              curl -fsS -X POST -H "X-Service-Token: ${INTERNAL_TRIGGER_TOKEN}" "$URL"
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
{{- end }}
