# Argo Workflows pipelines pour aetherwx maritime-atlas.
#
# Toggle granulaire par workflow — `false` = pas créé (Helm template skip).
# Permet d'activer pipeline par pipeline en gardant la rollback trivial
# (toggle false + commit + push).
workflows:
  # G12d (2026-05-22) — MVP hello-world. Run toutes les 5min, log un curl
  # vers /healthz d'un service maritime. But : valider que le pipeline
  # Argo Workflows fonctionne end-to-end, sans toucher à de la prod data.
  helloHealthz:
    enabled: true
    # Image curl légère utilisée pour les steps (~5Mi).
    image: curlimages/curl:8.10.1
    # Cible GeoServer /geoserver/web/ (200 OK sans auth).
    # IMPORTANT : trailing dot final sur le FQDN — sans lui, curl (musl
    # Alpine) ne résout pas alors que nslookup le fait. Bug musl-libc
    # vs ndots:5 + search domains. Cf debug 2026-05-22.
    targetUrl: "http://geoserver.maritime.svc.cluster.local.:8080/geoserver/web/"

  # G12e (2026-05-22) — GS health check : 3 vérifications séquentielles sur
  # GeoServer prod (version, workspace aetherwx, layer sst-daily). Si une
  # étape foire → workflow Failed + visible dans UI. But : monitoring
  # actif de la santé GS au-delà du livenessProbe basique du pod.
  # G12g (2026-05-22) — première migration source orchestrator NestJS →
  # Argo Workflows. Source pilote : usgs-earthquakes-day (id=306, cron */5).
  # Workflow trigger l'endpoint /internal-trigger/sources/:id de maritime-api
  # avec un header X-Service-Token. La logique d'ingest reste côté NestJS
  # (pattern "Workflow = chef d'orchestre" cf argo_workflows_study_2026_05_21).
  triggerUsgsEarthquakes:
    enabled: true
    image: curlimages/curl:8.10.1
    apiUrl: "http://maritime-api.maritime.svc.cluster.local.:3010"
    sourceId: 306
    # Secret K8s `maritime-internal-token` (ns argo) contient INTERNAL_TRIGGER_TOKEN
    secretName: "maritime-internal-token"

  # G12g-extension (2026-05-22) — 4 sources orchestrator migrées au pattern
  # Argo. Pendant 24h les schedulers NestJS tournent en parallèle (idempotent
  # INSERT ON CONFLICT). Désactivation côté NestJS via UI /admin/orchestrator
  # après observation OK.
  triggerMetarEu:
    enabled: true
    image: curlimages/curl:8.10.1
    apiUrl: "http://maritime-api.maritime.svc.cluster.local.:3010"
    sourceId: 199
    secretName: "maritime-internal-token"
  triggerHubeauDebits:
    enabled: true
    image: curlimages/curl:8.10.1
    apiUrl: "http://maritime-api.maritime.svc.cluster.local.:3010"
    sourceId: 244
    secretName: "maritime-internal-token"
  triggerFirmsModis:
    enabled: true
    image: curlimages/curl:8.10.1
    apiUrl: "http://maritime-api.maritime.svc.cluster.local.:3010"
    sourceId: 349
    secretName: "maritime-internal-token"
  triggerSatelliteModis:
    enabled: true
    image: curlimages/curl:8.10.1
    apiUrl: "http://maritime-api.maritime.svc.cluster.local.:3010"
    sourceId: 745
    secretName: "maritime-internal-token"

  gsHealthcheck:
    enabled: true
    image: curlimages/curl:8.10.1
    gsUrl: "http://geoserver.maritime.svc.cluster.local.:8080/geoserver"
    # 2026-05-22 fix sécu : creds lues depuis Secret K8s `gs-healthcheck-creds`
    # dans namespace `argo` (créé hors gitops via kubectl create secret).
    # Le password n'apparaît plus dans les manifests publiques.
    secretName: "gs-healthcheck-creds"
    # Workspace + layer testés (sentinelles : si ces 2 sont OK, le coverage
    # GFS/SST data layer est probablement OK aussi).
    workspace: "aetherwx"
    layer: "sst-daily"
