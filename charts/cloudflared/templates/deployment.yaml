apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels: { app: cloudflared }
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      # dnsConfig ndots:1 (Sylvain 2026-05-16) : le node Big-Blue a un
      # DHCP corporate qui injecte `search csfr.campbellsci.com home` dans
      # /etc/resolv.conf. Avec ndots:5 (k8s default), résoudre un FQDN
      # comme maritime-frontend.maritime.svc.cluster.local traverse tous
      # les search paths avant l'absolute → timeout 5s sur certains DNS
      # externes → cloudflared retourne 502 sur les fresh requests post-
      # rollout upstream. Cause des 502 répétés sur /geoserver/* après les
      # deploys de ce matin (2026-05-16).
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: cloudflared
          image: {{ .Values.image }}
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          ports:
            - name: metrics
              containerPort: 2000
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: token
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
