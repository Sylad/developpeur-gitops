apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmail
  labels: { app: jobmail }
spec:
  replicas: {{ .Values.replicas }}
  # SQLite single-writer → on évite les rollouts qui font cohabiter 2 pods.
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: jobmail }
  template:
    metadata:
      labels: { app: jobmail }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: jobmail
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: {{ .Values.port }} }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: jobmail-data
          {{- else }}
          emptyDir: {}
          {{- end }}
