{{- if .Values.services.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maritime-api
  labels: { app: maritime-api }
spec:
  replicas: {{ .Values.services.api.replicas }}
  selector:
    matchLabels: { app: maritime-api }
  template:
    metadata:
      labels: { app: maritime-api }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api
          image: "{{ .Values.services.api.image }}:{{ .Values.services.api.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.services.api.port }}
          env:
            {{- range $k, $v := .Values.services.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- include "maritime.dbUrlEnv" . | nindent 12 }}
            {{- include "maritime.rmqEnv" . | nindent 12 }}
          # Secret hors-Git (créé manuellement, contient GOOGLE_CLIENT_ID,
          # GOOGLE_CLIENT_SECRET, GOOGLE_CALLBACK_URL). TODO : remplacer
          # par SealedSecret quand kubeseal sera installé.
          envFrom:
            - secretRef:
                name: maritime-google-oauth
                optional: true
            # G12g (2026-05-22) — INTERNAL_TRIGGER_TOKEN pour Argo Workflows
            # trigger endpoint (cf orchestrator/internal-trigger.controller.ts).
            # GEOSERVER_ADMIN_USER + GEOSERVER_ADMIN_PASSWORD (refacto SEC-1).
            - secretRef:
                name: maritime-shared-env
                optional: false
          resources:
            {{- toYaml .Values.services.api.resources | nindent 12 }}
      # Phase 4 (2026-05-19) — api n'a plus besoin de PVC satellite-data :
      # le sidecar grib-parser écrit les GeoTIFFs dans /coverage/sat-<product>/
      # (PVC maritime-coverage déjà monté côté grib-parser).
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: maritime-api }
  ports:
    - port: {{ .Values.services.api.port }}
      targetPort: {{ .Values.services.api.port }}
{{- end }}
