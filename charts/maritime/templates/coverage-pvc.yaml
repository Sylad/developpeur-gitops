# PVC RWX Longhorn pour les volumes partagés entre fetchers + GS + frontend.
# Remplace les hostPath de transition (cf vague 2 quick fix).
#
# Requiert Longhorn installé sur le cluster avec StorageClass `longhorn`.
# Cf [[longhorn_wsl2_setup]] mémoire pour le setup.
{{- if .Values.coverage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-coverage
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.coverage.storageClass | default "longhorn" }}
  resources:
    requests:
      # 2026-05-19 : bump 10Gi → 50Gi pour absorber retention 7j obs (cf
      # politique data layer maritime). ~3GB rasters 7j + marge pour évolutions
      # (Meteosat 15min, RainViewer 10min). Longhorn supporte l'expansion online.
      storage: {{ .Values.coverage.coverageSize | default "50Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-wind-arrows
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.coverage.storageClass | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.coverage.windArrowsSize | default "2Gi" }}
---
# 2026-06-18 — SORTIE Longhorn RWX : coverages sur volume node-local
# (local-path RWO). Le share-manager NFS de Longhorn RWX se désynchronisait
# (montages obsolètes / EIO sur /coverage → incidents wind-arrows + coverage).
# Mono-nœud : GS + fetchers sur le même nœud → RWO suffit. Données migrées via
# Job coverage-localpath-migrate (285M coverage + 112M wind-arrows).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-coverage-local
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.coverage.coverageLocalSize | default "20Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-wind-arrows-local
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.coverage.windArrowsLocalSize | default "2Gi" }}
{{- end }}
# Phase 4 (2026-05-19) — le PVC maritime-satellites a été retiré : les
# GeoTIFFs satellites sont maintenant écrits dans /coverage/sat-<product>/
# (PVC maritime-coverage existant) via grib-parser sidecar, et servis par
# GeoServer ImageMosaic comme tous les autres rasters.
