# PVC RWX Longhorn pour les volumes partagés entre fetchers + GS + frontend.
# Remplace les hostPath de transition (cf vague 2 quick fix).
#
# Requiert Longhorn installé sur le cluster avec StorageClass `longhorn`.
# Cf [[longhorn_wsl2_setup]] mémoire pour le setup.
{{- if .Values.coverage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-coverage
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.coverage.storageClass | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.coverage.coverageSize | default "10Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-wind-arrows
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.coverage.storageClass | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.coverage.windArrowsSize | default "2Gi" }}
---
# 2026-05-19 APEX Satellites — volume RWX partagé entre maritime-api (writer
# orchestrator file_save sink) et maritime-frontend (nginx read-only serve).
# 1 image JPG/PNG par produit par jour, 7 produits → ~50 Mo/jour, retention
# 30 jours = ~1.5 Gi. Default 5Gi confortable.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maritime-satellites
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes: [ReadWriteMany]
  storageClassName: {{ .Values.coverage.storageClass | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.coverage.satellitesSize | default "5Gi" }}
{{- end }}
