{{- if .Values.services.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maritime-frontend
  labels: { app: maritime-frontend }
spec:
  replicas: {{ .Values.services.frontend.replicas }}
  selector:
    matchLabels: { app: maritime-frontend }
  template:
    metadata:
      labels: { app: maritime-frontend }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: frontend
          image: "{{ .Values.services.frontend.image }}:{{ .Values.services.frontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.services.frontend.port }}
          volumeMounts:
            # nginx sert /wind-arrows/manifest.json + *.geojson depuis ce
            # path (cf nginx.conf de l'image). Les fichiers sont écrits
            # par weather-fetcher* dans le hostPath partagé.
            - name: wind-arrows-data
              mountPath: /usr/share/nginx/wind-arrows
              readOnly: true
            # APEX Satellites (2026-05-19) : volume RW côté api, RO côté
            # nginx qui sert /satellites/* depuis ce path.
            - name: satellite-data
              mountPath: /usr/share/nginx/satellites
              readOnly: true
          resources:
            {{- toYaml .Values.services.frontend.resources | nindent 12 }}
      volumes:
        - name: wind-arrows-data
          persistentVolumeClaim:
            claimName: maritime-wind-arrows
        - name: satellite-data
          persistentVolumeClaim:
            claimName: maritime-satellites
---
apiVersion: v1
kind: Service
metadata:
  name: maritime-frontend
spec:
  selector: { app: maritime-frontend }
  ports:
    - port: 80
      targetPort: {{ .Values.services.frontend.port }}
{{- end }}
