{{- if .Values.services.geoserver.enabled }}
# Wrapper bootstrap script v3 — validé Big-Blue local 2026-05-17 06h.
#
# Setup cible Mini-Blue (vs sandbox K8s d'hier soir) :
#  - DB pg-catalog `maritime` (existante, 181 rows JDBCConfig préservés)
#  - Schema `geoserver` dans cette DB (existant)
#  - User `maritime` avec search_path = geoserver, public (à set 1× post-deploy)
#  - Extension postgis dans DB maritime (à set 1× post-deploy)
#
# L'image OSGeo gère nativement la datasource JNDI jdbc/postgres via
# server.xml templated par /opt/startup.sh à partir des env :
#   POSTGRES_USERNAME / POSTGRES_PASSWORD / POSTGRES_HOST / POSTGRES_PORT /
#   POSTGRES_DB / POSTGRES_JNDI_ENABLED=true.
#
# Le wrapper fait juste :
#  1. Wait DB reachable
#  2. CREATE TABLE tomcat_sessions (PersistentManager ne le crée pas auto)
#  3. Extract SQL init scripts depuis JARs JDBCStore + JDBCConfig
#  4. Écrit jdbcconfig.properties + jdbcstore.properties en mode JNDI jdbc/postgres
#  5. exec /opt/startup.sh (entrypoint OSGeo)
#
# Source de vérité (synchro manuelle entre les 2 repos) :
# maritime-atlas/geoserver/cluster/cluster-bootstrap.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: geoserver-bootstrap
data:
  cluster-bootstrap.sh: |
    #!/bin/bash
    set -e
    GEOSERVER_DATA_DIR="${GEOSERVER_DATA_DIR:-/opt/geoserver_data}"
    NODE_ID="${HOSTNAME:-unknown}"
    LIB_DIR=/usr/local/tomcat/webapps/geoserver/WEB-INF/lib

    echo "[cluster-bootstrap] node=${NODE_ID}"

    if command -v psql >/dev/null 2>&1; then
      echo "[cluster-bootstrap] waiting for DB..."
      for i in $(seq 1 30); do
        if PGPASSWORD="${POSTGRES_PASSWORD}" psql \
            -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT:-5432}" \
            -U "${POSTGRES_USERNAME}" -d "${POSTGRES_DB}" \
            -c "SELECT 1" >/dev/null 2>&1; then
          echo "[cluster-bootstrap]   DB reachable on try $i"
          break
        fi
        sleep 2
      done
    fi

    # CREATE TABLE tomcat_sessions (idempotent, sera créée dans le schema
    # de search_path par défaut du user — = geoserver après notre ALTER USER)
    PGPASSWORD="${POSTGRES_PASSWORD}" psql \
      -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT:-5432}" \
      -U "${POSTGRES_USERNAME}" -d "${POSTGRES_DB}" \
      -c "CREATE TABLE IF NOT EXISTS tomcat_sessions (
            session_id    VARCHAR(100) PRIMARY KEY,
            valid_session CHAR(1) NOT NULL,
            max_inactive  INT NOT NULL,
            last_access   BIGINT NOT NULL,
            app_name      VARCHAR(255),
            session_data  BYTEA);
          CREATE INDEX IF NOT EXISTS idx_tomcat_sessions_app ON tomcat_sessions(app_name);" \
      2>&1 | head -5

    mkdir -p "${GEOSERVER_DATA_DIR}/jdbcconfig/scripts" "${GEOSERVER_DATA_DIR}/jdbcstore/scripts"

    # Extract SQL init scripts depuis les JARs (requis par JDBCStore)
    JDBCSTORE_JAR=$(ls $LIB_DIR/gs-jdbcstore-*.jar 2>/dev/null | head -1)
    JDBCCONFIG_JAR=$(ls $LIB_DIR/gs-jdbcconfig-*.jar 2>/dev/null | head -1)
    if [ -n "$JDBCSTORE_JAR" ]; then
      cd /tmp && unzip -o -j "$JDBCSTORE_JAR" "org/geoserver/jdbcstore/internal/*.sql" \
        -d "${GEOSERVER_DATA_DIR}/jdbcstore/scripts/" >/dev/null 2>&1 || true
      echo "[cluster-bootstrap] jdbcstore SQL scripts extracted"
    fi
    if [ -n "$JDBCCONFIG_JAR" ]; then
      cd /tmp && unzip -o -j "$JDBCCONFIG_JAR" "org/geoserver/jdbcconfig/internal/*.sql" \
        -d "${GEOSERVER_DATA_DIR}/jdbcconfig/scripts/" >/dev/null 2>&1 || true
      echo "[cluster-bootstrap] jdbcconfig SQL scripts extracted"
    fi

    # Détection idempotence : tables JDBCConfig déjà créées (cas Mini-Blue
    # qui a déjà 181 rows dans schema geoserver) ?
    JDBC_INIT=true
    TABLE_EXISTS=$(PGPASSWORD="${POSTGRES_PASSWORD}" psql \
      -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT:-5432}" \
      -U "${POSTGRES_USERNAME}" -d "${POSTGRES_DB}" \
      -tAc "SELECT to_regclass('object') IS NOT NULL" 2>/dev/null || echo "f")
    [ "$TABLE_EXISTS" = "t" ] && JDBC_INIT=false

    # 2026-05-18 (Sylvain) — bypass JNDI : on écrit les credentials JDBC
    # DIRECT dans le .properties. La datasource JNDI jdbc/postgres que
    # l'image OSGeo est censée templater (depuis POSTGRES_JNDI_ENABLED=true
    # + env POSTGRES_*) ne marche pas → JDBCConfig fallback sur les
    # defaults bundled (jdbcUrl=localhost:5432/gscatalog) → connexion
    # échoue silencieusement → factory mode sans maritime workspace.
    # Bug récurrent depuis le sprint refacto JDBCConfig (2026-05-16/17).
    #
    # Mode direct : driver pgjdbc + jdbcUrl avec ?currentSchema=geoserver,public
    # pour cibler le schema GS dans la DB maritime. Le password en clair
    # dans le fichier est moins propre que JNDI mais ça MARCHE.
    cat > "${GEOSERVER_DATA_DIR}/jdbcconfig/jdbcconfig.properties" <<EOF
    enabled=true
    initdb=${JDBC_INIT}
    import=${JDBC_INIT}
    driverClassName=org.postgresql.Driver
    jdbcUrl=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?currentSchema=geoserver,public
    username=${POSTGRES_USERNAME}
    password=${POSTGRES_PASSWORD}
    pool.maxActive=10
    pool.minIdle=4
    pool.poolPreparedStatements=true
    pool.testOnBorrow=true
    pool.validationQuery=SELECT now()
    EOF
    cat > "${GEOSERVER_DATA_DIR}/jdbcstore/jdbcstore.properties" <<EOF
    enabled=true
    initdb=${JDBC_INIT}
    driverClassName=org.postgresql.Driver
    jdbcUrl=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?currentSchema=geoserver,public
    username=${POSTGRES_USERNAME}
    password=${POSTGRES_PASSWORD}
    EOF

    # G42f (2026-05-23) — Sprint 0 workspace rename `maritime → aetherwx`
    # a oublié les GWC tile layer configs. gwc-layers/*.xml contiennent
    # encore <name>maritime:sst-daily</name> etc. Conséquence : GWC voit ces
    # layers comme "non cachées" pour le NEW workspace alors qu'elles ont la
    # même coverage GS sous-jacente. PUT REST échoue "already exists".
    # Fix : sed in-place sur les fichiers gwc-layers AVANT que GS load.
    GWC_LAYERS_DIR="${GEOSERVER_DATA_DIR}/gwc-layers"
    if [ -d "$GWC_LAYERS_DIR" ]; then
      echo "[cluster-bootstrap] renaming maritime: → aetherwx: in gwc-layers/"
      count=$(grep -l ">maritime:" "$GWC_LAYERS_DIR"/*.xml 2>/dev/null | wc -l)
      if [ "$count" -gt 0 ]; then
        # Sed dans chaque <name>maritime:X</name> → <name>aetherwx:X</name>.
        # On garde les <id>LayerInfo.{UUID}</id> intacts (GS-side mapping
        # to catalog par GUID, pas par name).
        sed -i 's|>maritime:|>aetherwx:|g' "$GWC_LAYERS_DIR"/*.xml
        echo "[cluster-bootstrap]   $count files updated"
      else
        echo "[cluster-bootstrap]   no maritime: references found (already migrated)"
      fi
    fi

    # G42d (2026-05-23) — Force gwc-gs.xml avec Direct WMS Integration ON +
    # EPSG:3857 dans defaultCachingGridSetIds AVANT le boot GS. Sinon le
    # service GWC charge en mémoire l'ancien fichier (directWMSIntegration=false
    # par défaut OSGeo). REST PUT /rest/resource/gwc-gs.xml renvoie 201 mais
    # ne touche pas le fichier (GS sérialise sa GWCConfig en RAM par-dessus).
    # Solution : écrire directement le fichier AVANT que GS le lise.
    cat > "${GEOSERVER_DATA_DIR}/gwc-gs.xml" <<'GWCEOF'
    <GeoServerGWCConfig>
      <version>1.1.0</version>
      <directWMSIntegrationEnabled>true</directWMSIntegrationEnabled>
      <requireTiledParameter>false</requireTiledParameter>
      <WMSCEnabled>true</WMSCEnabled>
      <TMSEnabled>true</TMSEnabled>
      <securityEnabled>false</securityEnabled>
      <cacheLayersByDefault>true</cacheLayersByDefault>
      <cacheNonDefaultStyles>true</cacheNonDefaultStyles>
      <metaTilingX>4</metaTilingX>
      <metaTilingY>4</metaTilingY>
      <gutter>0</gutter>
      <defaultCachingGridSetIds>
        <string>EPSG:4326</string>
        <string>EPSG:900913</string>
        <string>EPSG:3857</string>
      </defaultCachingGridSetIds>
      <defaultCoverageCacheFormats>
        <string>image/png</string>
        <string>image/jpeg</string>
      </defaultCoverageCacheFormats>
      <defaultVectorCacheFormats>
        <string>image/png</string>
        <string>image/jpeg</string>
      </defaultVectorCacheFormats>
      <defaultOtherCacheFormats>
        <string>image/png</string>
        <string>image/jpeg</string>
      </defaultOtherCacheFormats>
    </GeoServerGWCConfig>
    GWCEOF
    echo "[cluster-bootstrap] gwc-gs.xml écrit avec directWMSIntegration=true + EPSG:3857"

    echo "[cluster-bootstrap] done, exec /opt/startup.sh"
    exec /opt/startup.sh "$@"
{{- end }}
