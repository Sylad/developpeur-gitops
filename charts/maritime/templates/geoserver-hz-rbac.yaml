{{- if .Values.services.geoserver.enabled }}
# RBAC requis par le mécanisme de discovery Kubernetes natif de Hazelcast 5.x.
# Le ClassPath classpath:com.hazelcast:hazelcast-kubernetes interroge
# l'API K8s pour lister les Endpoints du Service geoserver-hz, pour
# trouver les IPs des autres pods GS et établir le mesh TCP/5701.
#
# Permissions minimales : get/list/watch sur endpoints/pods/services dans
# le namespace courant (pas cluster-wide).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: geoserver-hz
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: geoserver-hz
rules:
  - apiGroups: [""]
    resources: ["endpoints", "pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: geoserver-hz
subjects:
  - kind: ServiceAccount
    name: geoserver-hz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: geoserver-hz
{{- end }}
