{{- if .Values.services.geoserver.enabled }}
# GeoServer warm-up Job — PostSync hook
#
# Le premier rendu WMS full-screen sur un raster (SST, wind, wave) prend
# 10-15s à cause du cold cache JAI/granule : ImageMosaic doit indexer les
# GeoTIFFs, charger le SLD, allouer les buffers BICUBIC, etc. Les requêtes
# suivantes sur le même BBOX = 0.5s grâce au cache.
#
# Pour éviter le "SST apparaît puis disparait" (Sylvain 2026-05-15) côté
# UX, on pré-chauffe le cache après chaque deploy en tirant quelques
# GetMap fullscreen sur les BBOX Europe communes. Tourne en arrière-plan,
# n'impacte pas les requêtes utilisateur (control-flow plafonne).
#
# Idempotent : si le cache est déjà chaud, les requêtes répondent
# instantanément, donc le Job termine en quelques secondes.
# RBAC pour que le warmup Job puisse list pods et récupérer les PodIP.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: geoserver-warmup
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: geoserver-warmup-pods-read
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: geoserver-warmup-pods-read
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: geoserver-warmup
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: geoserver-warmup-pods-read
---
apiVersion: batch/v1
kind: Job
metadata:
  name: geoserver-warmup
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels: { app: geoserver-warmup }
    spec:
      restartPolicy: OnFailure
      serviceAccountName: geoserver-warmup
      containers:
        - name: warmup
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              COMMON="REQUEST=GetMap&SERVICE=WMS&VERSION=1.3.0&FORMAT=image/png&STYLES=&TRANSPARENT=true&WIDTH=1280&HEIGHT=720&CRS=EPSG:3857"
              BBOXES="
                -2852561,4306416,3409159,7415263
                -800746,4356862,2017012,5755836
                -1500000,4500000,2500000,6500000
                -3000000,4000000,3500000,7500000
              "
              LAYERS="maritime:sst-daily maritime:wind-speed maritime:wind-speed-arpege maritime:wind-speed-arome maritime:wave-hs"

              # On hit chaque pod GS individuellement via son PodIP plutôt
              # que le Service (round-robin) — sinon une seule replica sur
              # deux est warmée statistiquement, et l'autre froide cause
              # "image disparait toutes les ~1min" quand le LB y route
              # (Sylvain 2026-05-15). Liste pods via K8s API direct (SA
              # token monté en /var/run/secrets/kubernetes.io/serviceaccount/).
              SA_DIR=/var/run/secrets/kubernetes.io/serviceaccount
              TOKEN=$(cat $SA_DIR/token)
              NS=$(cat $SA_DIR/namespace)
              POD_IPS=$(curl -s --cacert $SA_DIR/ca.crt -H "Authorization: Bearer $TOKEN" \
                "https://kubernetes.default.svc/api/v1/namespaces/$NS/pods?labelSelector=app%3Dgeoserver" \
                | sed -n 's/.*"podIP": *"\([^"]*\)".*/\1/p' | sort -u)
              echo "[warmup] target pods:"
              echo "$POD_IPS"

              for IP in $POD_IPS; do
                echo "[warmup] ===> $IP"
                for LAYER in $LAYERS; do
                  for BBOX in $BBOXES; do
                    T_START=$(date +%s)
                    HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://$IP:8080/geoserver/maritime/wms?${COMMON}&LAYERS=${LAYER}&BBOX=${BBOX}")
                    T_END=$(date +%s)
                    echo "  ${LAYER} ${BBOX} → HTTP ${HTTP} in $((T_END-T_START))s"
                  done
                done
              done
              echo "[warmup] done — both replicas warmed."
          resources:
            requests: { cpu: "10m",  memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
{{- end }}
