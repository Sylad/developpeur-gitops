{{- if .Values.services.geoserver.enabled }}
# GeoServer — 1 replica preprod, PVC pour le data_dir, JDBCConfig pointe sur
# pg-catalog (175 rows déjà migrés). Sticky session via cookie pour avoir
# session persistence quand on passera à replicas > 1 (Phase prod).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data
spec:
  # ReadWriteMany via Longhorn Share Manager (NFS sous-jacent). Permet à
  # plusieurs replicas GS de mount la même PVC simultanément. Compromis
  # accepté preprod 2026-05-15 : workspaces SLD files lus par toutes les
  # replicas (style-bootstrap Job écrit, replicas read-only en pratique) ;
  # GWC tile cache potentiellement en race condition sur le même tile en
  # cours d'écriture (rare ; à isoler via S3 BlobStore SeaweedFS quand on
  # passera à >2 replicas ou prod).
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.services.geoserver.dataSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  labels: { app: geoserver }
spec:
  replicas: {{ .Values.services.geoserver.replicas }}
  strategy:
    # RollingUpdate compatible avec PVC RWX Longhorn : plusieurs pods
    # peuvent mount la même PVC en parallèle pendant le rollout.
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: geoserver }
  template:
    metadata:
      labels: { app: geoserver }
    spec:
      imagePullSecrets:
        - name: regcred
      initContainers:
        # JDBCConfig credentials sync (Sylvain 2026-05-15).
        # GeoServer JDBCConfig stocke username/password EN CLAIR dans le
        # fichier /opt/geoserver_data/jdbcconfig/jdbcconfig.properties.
        # Au boot, GS lit CE FICHIER ; les env vars GEOSERVER_JDBCCONFIG_*
        # ne sont PAS prises en compte automatiquement. Si le secret CNPG
        # pg-catalog-app est régénéré (boot pg pod, rotation operator, etc.),
        # le fichier disque devient stale → FATAL: password authentication
        # failed for user maritime au boot GS.
        #
        # Cet initContainer re-template le fichier à chaque pod start
        # depuis les valeurs courantes du secret. Idempotent.
        #
        # Méthode : grep -v puis append (pas de sed regex, évite les soucis
        # de caractères spéciaux dans le password).
        - name: jdbcconfig-sync
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              F=/opt/geoserver_data/jdbcconfig/jdbcconfig.properties
              mkdir -p /opt/geoserver_data/jdbcconfig
              # Toujours rewrite total : l'image upstream
              # docker.osgeo.org/geoserver écrit un default file avec
              # `enabled=false` + jdbcUrl localhost à son premier boot.
              # Si on se contente de re-template les credentials, le rest
              # reste à `enabled=false` → JDBCConfig disabled → Workspace
              # maritime not found (PVC RWX migration 2026-05-15). On
              # écrit la conf complète à chaque boot, idempotent.
              echo "Writing $F from secret pg-catalog-app + values inline…"
              cat > "$F" <<EOF
              enabled=true
              initdb=false
              import=false
              jdbcUrl=jdbc:postgresql://pg-catalog-rw.maritime.svc:5432/maritime?currentSchema=geoserver
              driverClassName=org.postgresql.Driver
              username=$JDBC_USER
              password=$JDBC_PASS
              pool.minIdle=1
              pool.maxActive=10
              pool.poolPreparedStatements=true
              pool.maxOpenPreparedStatements=50
              pool.testOnBorrow=true
              pool.validationQuery=SELECT now()
              EOF
              echo "Done."
          env:
            - name: JDBC_USER
              valueFrom:
                secretKeyRef: { name: pg-catalog-app, key: username }
            - name: JDBC_PASS
              valueFrom:
                secretKeyRef: { name: pg-catalog-app, key: password }
          volumeMounts:
            - name: data
              mountPath: /opt/geoserver_data
      containers:
        - name: geoserver
          image: "{{ .Values.services.geoserver.image }}:{{ .Values.services.geoserver.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GEOSERVER_ADMIN_USER
              value: admin
            - name: GEOSERVER_ADMIN_PASSWORD
              value: geoserver
            # JDBCConfig pointe sur pg-catalog (réplique exactement la config
            # du NAS : currentSchema=geoserver, hôte = pg-catalog service).
            - name: GEOSERVER_JDBCCONFIG_JDBC_URL
              value: "jdbc:postgresql://pg-catalog-rw.maritime.svc:5432/maritime?currentSchema=geoserver"
            - name: GEOSERVER_JDBCCONFIG_USER
              valueFrom:
                secretKeyRef: { name: pg-catalog-app, key: username }
            - name: GEOSERVER_JDBCCONFIG_PASSWORD
              valueFrom:
                secretKeyRef: { name: pg-catalog-app, key: password }
            # JVM tuned pour GeoServer (Sylvain 2026-05-14) :
            # - Xmx6g : heap généreuse pour IDW + reproject + mosaic
            # - G1GC : low-pause collector, stable sur long-running
            # - MaxGCPauseMillis 200 : cible pauses GC raisonnables
            # - StringDeduplication : économise heap sur les nombreuses
            #   strings dupliquées (SLD, attribut layers, etc.)
            # - HeapDump on OOM : capture pour post-mortem dans /tmp
            # - ExitOnOutOfMemoryError : kill pod sur OOM → restart K8s
            #   propre au lieu d'un zombie qui mange la RAM
            # - forceXY : EPSG axis order stable (lon,lat) — connu pour
            #   éviter les bugs de reproject silencieux
            # - timezone UTC + encoding UTF-8 : explicites
            - name: JAVA_OPTS
              value: >-
                -Xms512m -Xmx6g
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
                -XX:+ParallelRefProcEnabled
                -XX:+UseStringDeduplication
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/tmp/heapdump.hprof
                -XX:+ExitOnOutOfMemoryError
                -Djava.awt.headless=true
                -Dorg.geotools.referencing.forceXY=true
                -Duser.timezone=UTC
                -Dfile.encoding=UTF-8
            # L'image GeoServer (Docker Hub officielle) injecte
            # `EXTRA_JAVA_OPTS=-Xms256m -Xmx1g` via CATALINA_OPTS, qui
            # se concatène APRÈS $JAVA_OPTS dans la commande JVM → le
            # dernier -Xmx gagne et notre 6g est silencieusement écrasé
            # à 1g. Diagnostiqué via heap dump 1.1 GB sur OOM (Sylvain
            # 2026-05-15). On override pour matcher JAVA_OPTS.
            - name: EXTRA_JAVA_OPTS
              value: "-Xms512m -Xmx6g"
            # Accélération native JAI (PNG/JPEG/TIFF) — encode jusqu'à
            # 3-5× plus vite que le pure Java sur les rasters volumineux.
            - name: JAI_PNG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_JPEG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_TIFF_NATIVE_ACCELERATION
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /opt/geoserver_data
            # Control-Flow config injected via ConfigMap (subPath single-file
            # overlay sur la PVC RWX). Changement = juste re-apply chart, pas
            # de rebuild image. Le plugin GS le lit au startup.
            - name: controlflow-config
              mountPath: /opt/geoserver_data/controlflow.properties
              subPath: controlflow.properties
            # GWC tile cache : overlay emptyDir per-pod sur le subdir
            # de la PVC RWX partagée. Évite la race condition sur les
            # writes de tile entre les 2 replicas (chacun a son propre
            # cache éphémère, recalcule sur miss). Compromis : 2× travail
            # IDW si tile demandée d'abord côté replica A puis B. Acceptable
            # preprod ; à remplacer par GWC S3 BlobStore SeaweedFS quand
            # >2 replicas ou prod.
            - name: gwc-cache
              mountPath: /opt/geoserver_data/gwc
            # Coverage rasters (GFS/AROME/ARPEGE/SST) écrits par les
            # services weather-fetcher* et sst-fetcher. PVC RWX Longhorn.
            - name: coverage-data
              mountPath: /coverage
          resources:
            {{- toYaml .Values.services.geoserver.resources | nindent 12 }}
          startupProbe:
            httpGet:
              # /geoserver/web/ retourne 302 (redirect), /geoserver/web/index.html
              # retourne 404, seul /geoserver/index.html retourne 200 direct.
              # Connu de Sylvain au taff.
              path: /geoserver/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 60   # 15s × 60 = 15 min, tomcat + Spring slow boot
          livenessProbe:
            httpGet:
              # /geoserver/web/ retourne 302 (redirect), /geoserver/web/index.html
              # retourne 404, seul /geoserver/index.html retourne 200 direct.
              # Connu de Sylvain au taff.
              path: /geoserver/index.html
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geoserver-data
        - name: controlflow-config
          configMap:
            name: geoserver-controlflow
        # GWC tile cache local per-pod (emptyDir) — voir comment volumeMount.
        - name: gwc-cache
          emptyDir:
            sizeLimit: 2Gi
        - name: coverage-data
          persistentVolumeClaim:
            claimName: maritime-coverage
---
# Service GeoServer — replace l'ancien stub que j'avais créé. Si le stub
# existe encore, Helm le réconciliera (même nom = même Service).
apiVersion: v1
kind: Service
metadata:
  name: geoserver
spec:
  selector: { app: geoserver }
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
