{{- if .Values.services.geoserver.enabled }}
# ─── GeoServer — sprint refacto v3 (validé Big-Blue compose 2026-05-17) ──
#
# Migration pg-catalog DB `maritime` schema `geoserver` (= existant) avec :
#  - Image custom sha-a2b2c5b (docker.osgeo.org/geoserver:2.28.3 + plugins
#    JDBCConfig+JDBCStore depuis OSGeo Nexus + pg-jdbc driver + context.xml.tpl)
#  - Conventions OSGeo natives via env vars : POSTGRES_USERNAME (pas USER),
#    POSTGRES_JNDI_ENABLED=true → image template server.xml elle-même
#  - ConfigMap geoserver-bootstrap monté sur /scripts-extra/ qui setup
#    tomcat_sessions + extract SQL init JARs JDBC + write properties JNDI
#  - Catalog reste dans pg-catalog (181 rows JDBCConfig préservées)
#
# Préalable Mini-Blue (1× post-deploy, idempotent) :
#   ALTER USER maritime SET search_path TO geoserver, public;
#   CREATE EXTENSION postgis;  -- dans DB maritime

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.services.geoserver.dataSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  labels: { app: geoserver }
spec:
  replicas: {{ .Values.services.geoserver.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: geoserver }
  template:
    metadata:
      labels: { app: geoserver }
      annotations:
        # G42d (2026-05-23) — checksum du bootstrap ConfigMap. Quand le script
        # change (ex: fix gwc-gs.xml init), cette annotation change → K8s déclenche
        # un rolling restart auto. Sans ça, ConfigMap update ne touche pas le pod.
        checksum/bootstrap-script: {{ include (print $.Template.BasePath "/geoserver-bootstrap-script-configmap.yaml") . | sha256sum }}
        # G50 (2026-05-24) — track AUSSI le gwc-sat-config-job. Quand son
        # script REST change (DELETE/PUT logic, parameterFilters, gridsets,
        # diskquota), purge en RAM nécessaire pour appliquer proprement.
        checksum/gwc-config-job: {{ include (print $.Template.BasePath "/gwc-sat-config-job.yaml") . | sha256sum }}
        # G50 — track aussi contour-sld-patch (modifications SLD ⇒ purge cache).
        checksum/contour-sld-patch: {{ include (print $.Template.BasePath "/contour-sld-patch-job.yaml") . | sha256sum }}
        # G56 (2026-05-24) — track sat workspace split job. Quand son script
        # change (migration nouveaux layers, etc.), pod restart pour purger
        # JDBCConfig cache et picker les nouveaux workspace refs des catalog
        # blobs migrés en SQL UPDATE.
        checksum/sat-workspace-split: {{ include (print $.Template.BasePath "/sat-workspace-split-job.yaml") . | sha256sum }}
        # G60 (2026-05-24) — track hz-cluster ConfigMap. Quand hazelcast.xml
        # ou cluster.properties change (RBAC tuning, namespace fix, etc.),
        # pod restart obligatoire pour reload config Hazelcast.
        {{- if .Values.geoserverCluster.enabled }}
        checksum/hz-cluster-config: {{ include (print $.Template.BasePath "/geoserver-hz-cluster.yaml") . | sha256sum }}
        {{- end }}
    spec:
      # G60 (2026-05-24) — serviceAccount `geoserver-hz` quand cluster.enabled,
      # sinon `default`. Le SA + Role créés par geoserver-hz-cluster.yaml
      # donnent permission list pods pour Hazelcast K8s discovery.
      serviceAccountName: {{ if .Values.geoserverCluster.enabled }}geoserver-hz{{ else }}default{{ end }}
      {{- if and (.Values.geoserverCluster.enabled) (gt (int .Values.services.geoserver.replicas) 1) }}
      # G60 — spread pods sur plusieurs nodes si possible (mini-blue single-node
      # = no-op, mais propre pour multi-node migration future).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: geoserver }
                topologyKey: kubernetes.io/hostname
      {{- end }}
      imagePullSecrets:
        - name: regcred
      containers:
        - name: geoserver
          image: "{{ .Values.services.geoserver.image }}:{{ .Values.services.geoserver.tag }}"
          imagePullPolicy: IfNotPresent
          # Override entrypoint OSGeo pour passer par notre wrapper qui setup
          # tomcat_sessions + extract SQL JDBC scripts + properties JNDI,
          # PUIS délègue à /opt/startup.sh (entrypoint OSGeo qui template
          # server.xml avec datasource JNDI jdbc/postgres et boot Tomcat).
          command: ["/bin/bash", "/scripts-extra/cluster-bootstrap.sh"]
          ports:
            - containerPort: 8080
          env:
            # ── Postgres connection (conventions OSGeo natives) ──────
            # IMPORTANT : OSGeo utilise POSTGRES_USERNAME (pas USER) qui est
            # interprété par /opt/startup.sh pour template server.xml avec
            # la datasource JNDI jdbc/postgres.
            - name: POSTGRES_HOST
              value: pg-catalog-rw.{{ .Release.Namespace }}.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: maritime
            - name: POSTGRES_USERNAME
              valueFrom: { secretKeyRef: { name: pg-catalog-app, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: pg-catalog-app, key: password } }
            # Active la datasource JNDI native (sinon désactivée par défaut)
            - name: POSTGRES_JNDI_ENABLED
              value: "true"
            # ── GS admin credentials ──────────────────────────────────
            # 2026-05-22 — fix sécu post code-review : password n'est plus
            # en clair (repo PUBLIC). Lecture via Secret maritime-shared-env.
            - name: GEOSERVER_ADMIN_USER
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_USER } }
            - name: GEOSERVER_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_PASSWORD } }
            # ── JVM tuning (cf mémoire geoserver_jvm_tuning_opts) ─────
            # 2026-05-19 — -Xmx lit `services.geoserver.heap` (single source
            # of truth). Le pod limit.memory est calculé heap + 1Gi en bas.
            # Impossible d'avoir un drift maintenant.
            - name: JAVA_OPTS
              value: >-
                -Xms512m -Xmx{{ .Values.services.geoserver.heap }}
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
                -XX:+ParallelRefProcEnabled
                -XX:+UseStringDeduplication
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/tmp/heapdump.hprof
                -XX:+ExitOnOutOfMemoryError
                -Djava.awt.headless=true
                -Dorg.geotools.referencing.forceXY=true
                -Duser.timezone=UTC
                -Dfile.encoding=UTF-8
            - name: EXTRA_JAVA_OPTS
              value: "-Xms512m -Xmx{{ .Values.services.geoserver.heap }}"
            - name: JAI_PNG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_JPEG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_TIFF_NATIVE_ACCELERATION
              value: "true"
            {{- if .Values.geoserverCluster.enabled }}
            # G60 — Hazelcast K8s discovery : need namespace via fieldRef.
            # ${HZ_K8S_NAMESPACE} substitué dans hazelcast.xml par Hazelcast 5.x.
            - name: HZ_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /opt/geoserver_data
            - name: bootstrap-script
              mountPath: /scripts-extra
              readOnly: true
            - name: coverage-data
              mountPath: /coverage
            {{- if .Values.geoserverCluster.enabled }}
            # G60 — hazelcast.xml + cluster.properties pour gs-hz-cluster
            - name: hz-config
              mountPath: /opt/geoserver_data/cluster/cluster.properties
              subPath: cluster.properties
            - name: hz-config
              mountPath: /opt/geoserver_data/cluster/hazelcast.xml
              subPath: hazelcast.xml
            {{- end }}
          resources:
            requests:
              {{- toYaml .Values.services.geoserver.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.services.geoserver.resources.limits | nindent 14 }}
              # 2026-05-19 — limits.memory dérivé automatiquement de heap + 3Gi
              # (marge off-heap pour metaspace + JAI native + threads). Garantit
              # que K8s OOMKiller ne tue PAS le pod avant que la JVM ait
              # vraiment dépassé son heap budget.
              # 2026-05-23 — bump marge 1Gi → 3Gi : avec CPU 4 cores + bicubic
              # concurrent, observé OOMKilled (6 restarts en 95min). 3Gi off-heap
              # = ~50% native du heap, marge confortable. Mini-Blue 15Gi a la place.
              memory: {{ printf "%dGi" (add (.Values.services.geoserver.heap | trimSuffix "g" | int) 3) }}
          startupProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geoserver-data
        {{- if .Values.geoserverCluster.enabled }}
        - name: hz-config
          configMap:
            name: geoserver-hz-config
        {{- end }}
        - name: bootstrap-script
          configMap:
            name: geoserver-bootstrap
            defaultMode: 0755
        - name: coverage-data
          persistentVolumeClaim:
            claimName: maritime-coverage
---
apiVersion: v1
kind: Service
metadata:
  name: geoserver
spec:
  selector: { app: geoserver }
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
