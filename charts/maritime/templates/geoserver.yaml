{{- if .Values.services.geoserver.enabled }}
# ─── GeoServer — sprint refacto archi 2026-05-16 ─────────────────────
#
# Refonte selon cahier des charges Sylvain (cf mémoire
# maritime_geoserver_target_architecture) :
#
#   - Image custom basée kartoza/geoserver
#   - PVC RWX longhorn partagé entre replicas
#   - Catalog en DB Postgres `geoserver` séparée (datasource JNDI Tomcat)
#   - Init via wrapper cluster-bootstrap.sh (mounté ConfigMap) qui :
#       * CREATE DATABASE geoserver
#       * envsubst sur context.xml.tpl → context.xml (JNDI datasource)
#       * CREATE TABLE tomcat_sessions
#       * écrit jdbcconfig.properties + jdbcstore.properties en mode JNDI
#       * délègue à l'entrypoint kartoza
#   - Plus de Job ArgoCD PostSync externe — tout dans le pod
#
# ─────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.services.geoserver.dataSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  labels: { app: geoserver }
spec:
  replicas: {{ .Values.services.geoserver.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: geoserver }
  template:
    metadata:
      labels: { app: geoserver }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: geoserver
          image: "{{ .Values.services.geoserver.image }}:{{ .Values.services.geoserver.tag }}"
          imagePullPolicy: IfNotPresent
          # Override l'entrypoint kartoza pour passer par notre wrapper
          # cluster-bootstrap.sh qui setup la conf cluster-aware avant
          # de déléguer à /scripts/start.sh (kartoza).
          command: ["/bin/bash", "/scripts-extra/cluster-bootstrap.sh"]
          ports:
            - containerPort: 8080
          env:
            # ── Postgres connection (datasource jdbc/geoserver) ──────
            # Le CREATE DATABASE geoserver est géré par la Database CRD
            # CNPG (déclaratif). On utilise le user `maritime` (owner de
            # la DB geoserver via Database CRD) — pattern moindre privilège.
            #
            # POSTGRES_USER / POSTGRES_PASSWORD aussi définis car l'entrypoint
            # Kartoza fait son propre wait-for-postgres au boot qui requiert
            # ces vars pour psql pg_isready. On pointe vers le même user
            # maritime — pas besoin de superuser pour le wait.
            - name: POSTGRES_HOST
              value: pg-catalog-rw.{{ .Release.Namespace }}.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: geoserver
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-catalog-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-catalog-app
                  key: password
            - name: GEOSERVER_DB_NAME
              value: geoserver
            - name: GEOSERVER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-catalog-app
                  key: username
            - name: GEOSERVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-catalog-app
                  key: password
            # ── GS admin credentials ──────────────────────────────────
            - name: GEOSERVER_ADMIN_USER
              value: admin
            - name: GEOSERVER_ADMIN_PASSWORD
              value: geoserver
            # ── Identité du replica (visible dans logs + datadir marker)
            - name: GEOSERVER_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # ── JVM tuning (cf mémoire geoserver_jvm_tuning_opts) ─────
            - name: JAVA_OPTS
              value: >-
                -Xms512m -Xmx6g
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
                -XX:+ParallelRefProcEnabled
                -XX:+UseStringDeduplication
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/tmp/heapdump.hprof
                -XX:+ExitOnOutOfMemoryError
                -Djava.awt.headless=true
                -Dorg.geotools.referencing.forceXY=true
                -Duser.timezone=UTC
                -Dfile.encoding=UTF-8
            # Image GS officielle injecte EXTRA_JAVA_OPTS=-Xmx1g qui
            # override le -Xmx6g de JAVA_OPTS si laissé par défaut.
            # Cf incident heap dump 1.1GB Sylvain 2026-05-15.
            - name: EXTRA_JAVA_OPTS
              value: "-Xms512m -Xmx6g"
            - name: JAI_PNG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_JPEG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_TIFF_NATIVE_ACCELERATION
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /opt/geoserver_data
            - name: bootstrap-script
              mountPath: /scripts-extra
              readOnly: true
            - name: controlflow-config
              mountPath: /cluster-config/controlflow.properties
              subPath: controlflow.properties
              readOnly: true
            - name: coverage-data
              mountPath: /coverage
          resources:
            {{- toYaml .Values.services.geoserver.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 60   # 15s × 60 = 15 min, Spring slow boot OK
          livenessProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geoserver-data
        - name: bootstrap-script
          configMap:
            name: geoserver-bootstrap
            defaultMode: 0755   # exécutable
        - name: controlflow-config
          configMap:
            name: geoserver-controlflow
        - name: coverage-data
          persistentVolumeClaim:
            claimName: maritime-coverage
---
apiVersion: v1
kind: Service
metadata:
  name: geoserver
spec:
  selector: { app: geoserver }
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
