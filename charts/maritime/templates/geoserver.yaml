{{- if .Values.services.geoserver.enabled }}
# ─── GeoServer — sprint refacto v3 (validé Big-Blue compose 2026-05-17) ──
#
# Migration pg-catalog DB `maritime` schema `geoserver` (= existant) avec :
#  - Image custom sha-a2b2c5b (docker.osgeo.org/geoserver:2.28.3 + plugins
#    JDBCConfig+JDBCStore depuis OSGeo Nexus + pg-jdbc driver + context.xml.tpl)
#  - Conventions OSGeo natives via env vars : POSTGRES_USERNAME (pas USER),
#    POSTGRES_JNDI_ENABLED=true → image template server.xml elle-même
#  - ConfigMap geoserver-bootstrap monté sur /scripts-extra/ qui setup
#    tomcat_sessions + extract SQL init JARs JDBC + write properties JNDI
#  - Catalog reste dans pg-catalog (181 rows JDBCConfig préservées)
#
# Préalable Mini-Blue (1× post-deploy, idempotent) :
#   ALTER USER maritime SET search_path TO geoserver, public;
#   CREATE EXTENSION postgis;  -- dans DB maritime

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.services.geoserver.dataSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  labels: { app: geoserver }
spec:
  replicas: {{ .Values.services.geoserver.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: geoserver }
  template:
    metadata:
      labels: { app: geoserver }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: geoserver
          image: "{{ .Values.services.geoserver.image }}:{{ .Values.services.geoserver.tag }}"
          imagePullPolicy: IfNotPresent
          # Override entrypoint OSGeo pour passer par notre wrapper qui setup
          # tomcat_sessions + extract SQL JDBC scripts + properties JNDI,
          # PUIS délègue à /opt/startup.sh (entrypoint OSGeo qui template
          # server.xml avec datasource JNDI jdbc/postgres et boot Tomcat).
          command: ["/bin/bash", "/scripts-extra/cluster-bootstrap.sh"]
          ports:
            - containerPort: 8080
          env:
            # ── Postgres connection (conventions OSGeo natives) ──────
            # IMPORTANT : OSGeo utilise POSTGRES_USERNAME (pas USER) qui est
            # interprété par /opt/startup.sh pour template server.xml avec
            # la datasource JNDI jdbc/postgres.
            - name: POSTGRES_HOST
              value: pg-catalog-rw.{{ .Release.Namespace }}.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: maritime
            - name: POSTGRES_USERNAME
              valueFrom: { secretKeyRef: { name: pg-catalog-app, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: pg-catalog-app, key: password } }
            # Active la datasource JNDI native (sinon désactivée par défaut)
            - name: POSTGRES_JNDI_ENABLED
              value: "true"
            # ── GS admin credentials ──────────────────────────────────
            - name: GEOSERVER_ADMIN_USER
              value: admin
            - name: GEOSERVER_ADMIN_PASSWORD
              value: geoserver
            # ── JVM tuning (cf mémoire geoserver_jvm_tuning_opts) ─────
            - name: JAVA_OPTS
              value: >-
                -Xms512m -Xmx6g
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
                -XX:+ParallelRefProcEnabled
                -XX:+UseStringDeduplication
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/tmp/heapdump.hprof
                -XX:+ExitOnOutOfMemoryError
                -Djava.awt.headless=true
                -Dorg.geotools.referencing.forceXY=true
                -Duser.timezone=UTC
                -Dfile.encoding=UTF-8
            - name: EXTRA_JAVA_OPTS
              value: "-Xms512m -Xmx6g"
            - name: JAI_PNG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_JPEG_NATIVE_ACCELERATION
              value: "true"
            - name: JAI_TIFF_NATIVE_ACCELERATION
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /opt/geoserver_data
            - name: bootstrap-script
              mountPath: /scripts-extra
              readOnly: true
            - name: coverage-data
              mountPath: /coverage
          resources:
            {{- toYaml .Values.services.geoserver.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /geoserver/index.html
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geoserver-data
        - name: bootstrap-script
          configMap:
            name: geoserver-bootstrap
            defaultMode: 0755
        - name: coverage-data
          persistentVolumeClaim:
            claimName: maritime-coverage
---
apiVersion: v1
kind: Service
metadata:
  name: geoserver
spec:
  selector: { app: geoserver }
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
