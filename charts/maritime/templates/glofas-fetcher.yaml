{{- if .Values.services.glofasFetcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glofas-fetcher
  labels: { app: glofas-fetcher }
spec:
  replicas: {{ .Values.services.glofasFetcher.replicas }}
  selector:
    matchLabels: { app: glofas-fetcher }
  template:
    metadata:
      labels: { app: glofas-fetcher }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: glofas-fetcher
          image: "{{ .Values.services.glofasFetcher.image }}:{{ .Values.services.glofasFetcher.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: COVERAGE_BASE_DIR
              value: /coverage/glofas
            - name: PYTHONUNBUFFERED
              value: "1"
            # GS REST pour bootstrap idempotent du layer (store+coverage+time dim)
            - name: GEOSERVER_URL
              value: "http://geoserver:8080/geoserver"
            - name: GEOSERVER_ADMIN_USER
              value: "admin"
            - name: GEOSERVER_WORKSPACE
              value: "aetherwx"
          # GEOSERVER_ADMIN_PASSWORD vient du Secret maritime-shared-env
          envFrom:
            - secretRef:
                name: maritime-shared-env
                optional: true
          volumeMounts:
            - name: coverage
              mountPath: /coverage
            - name: cds-credentials
              mountPath: /root/.cdsapirc
              subPath: cdsapirc
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.services.glofasFetcher.resources | nindent 12 }}
      volumes:
        - name: coverage
          persistentVolumeClaim:
            claimName: maritime-coverage-local
        - name: cds-credentials
          secret:
            secretName: glofas-cds-credentials
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: glofas-fetcher
spec:
  selector: { app: glofas-fetcher }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
