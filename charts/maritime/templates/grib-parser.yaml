{{- if .Values.services.gribParser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grib-parser
  labels: { app: grib-parser }
spec:
  replicas: {{ .Values.services.gribParser.replicas }}
  selector:
    matchLabels: { app: grib-parser }
  template:
    metadata:
      labels: { app: grib-parser }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: grib-parser
          image: "{{ .Values.services.gribParser.image }}:{{ .Values.services.gribParser.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            {{- toYaml .Values.services.gribParser.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: grib-parser
spec:
  selector: { app: grib-parser }
  ports:
    - port: 8001
      targetPort: 8001
{{- end }}
