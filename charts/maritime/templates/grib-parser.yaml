{{- if .Values.services.gribParser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grib-parser
  labels: { app: grib-parser }
spec:
  replicas: {{ .Values.services.gribParser.replicas }}
  selector:
    matchLabels: { app: grib-parser }
  template:
    metadata:
      labels: { app: grib-parser }
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: grib-parser
          image: "{{ .Values.services.gribParser.image }}:{{ .Values.services.gribParser.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8500
          # 2026-05-23 — GEOSERVER_ADMIN_USER + GEOSERVER_ADMIN_PASSWORD requis
          # pour POST /rest/workspaces/<ws>/coveragestores. Sans, fallback
          # ('admin','geoserver') → HTTP 401 Unauthorized GS REST.
          envFrom:
            - secretRef:
                name: maritime-shared-env
                optional: false
          volumeMounts:
            # 2026-05-19 APEX Satellites Phase 4 — grib-parser doit pouvoir
            # écrire les GeoTIFFs dans le volume partagé avec GeoServer.
            # Bug latent jamais déclenché avant : weather-orchestrator-gfs-wind
            # (le seul autre user) était enabled=false dans le seed.
            - name: coverage-data
              mountPath: /coverage
          resources:
            {{- toYaml .Values.services.gribParser.resources | nindent 12 }}
      volumes:
        - name: coverage-data
          persistentVolumeClaim:
            claimName: maritime-coverage
---
apiVersion: v1
kind: Service
metadata:
  name: grib-parser
spec:
  selector: { app: grib-parser }
  ports:
    - port: 8500
      targetPort: 8500
{{- end }}
