{{- if .Values.gwcS3Blobstore.enabled }}
# Maritime — GWC S3 blobstore (G58)
#
# 2026-05-24 — Sprint cluster-ready : configure GWC pour stocker les
# tuiles cachées dans SeaweedFS S3 (bucket maritime-gwc-tiles) au lieu
# de l'emptyDir per-pod. Pré-requis :
#   - G57 SeaweedFS déployé (filer S3 :8333 ready, bucket créé)
#
# Idempotent : PUT XML blobstore overwrites + assignation par layer
# via PUT XML <blobStoreId>maritime-s3</blobStoreId>.
#
# Validation : test que GS encore en 1 replica accepte le cache S3 (perf
# similaire à emptyDir grâce à GS GWC in-memory L1 cache devant).
apiVersion: v1
kind: ConfigMap
metadata:
  name: maritime-gwc-s3-blobstore-script
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    GS_URL="${GS_URL:-http://geoserver:8080/geoserver}"
    GS_AUTH="${GS_USER:-admin}:${GS_PASSWORD:-geoserver}"
    S3_ENDPOINT="${S3_ENDPOINT:-http://seaweedfs-filer:8333}"
    BUCKET="${S3_BUCKET:-maritime-gwc-tiles}"

    log() { echo "[$(date -u -Iseconds)] $*"; }

    # ─── 1. PUT blobstore maritime-s3 ───────────────────────────────
    log "→ PUT GWC blobstore maritime-s3"
    cat > /tmp/blobstore.xml <<XML
    <S3BlobStore default="false">
      <id>maritime-s3</id>
      <enabled>true</enabled>
      <bucket>${BUCKET}</bucket>
      <prefix>gwc</prefix>
      <awsAccessKey>${S3_ACCESS_KEY}</awsAccessKey>
      <awsSecretKey>${S3_SECRET_KEY}</awsSecretKey>
      <endpoint>${S3_ENDPOINT}</endpoint>
      <access>PRIVATE</access>
      <maxConnections>50</maxConnections>
      <useHttps>false</useHttps>
      <useGzip>true</useGzip>
    </S3BlobStore>
    XML
    curl -sk -u "$GS_AUTH" -X PUT -H "Content-Type: application/xml" \
      --data-binary @/tmp/blobstore.xml \
      "$GS_URL/gwc/rest/blobstores/maritime-s3" \
      -o /tmp/resp -w "  PUT blobstore %{http_code}\n"
    head -c 200 /tmp/resp; echo

    # ─── 2. Assigne tous les GWC layers au blobstore maritime-s3 ────
    log "→ assign layers to maritime-s3"
    for layer in \
      "aetherwx:sst-daily" \
      "aetherwx:wind-speed" \
      "aetherwx:wave-hs" \
      "aetherwx:wave-dir" \
      "aetherwx-sat:sat-modis-true-color" \
      "aetherwx-sat:sat-viirs-true-color" \
      "aetherwx-sat:sat-modis-ir" \
      "aetherwx-sat:sat-airs-air-temp" \
      "aetherwx-sat:sat-modis-cloud-top" \
      "aetherwx-sat:sat-modis-aerosol" \
      "aetherwx-sat:sat-viirs-day-night"; do
      CODE=$(curl -sk -u "$GS_AUTH" -o /dev/null -w "%{http_code}" \
        "$GS_URL/gwc/rest/layers/$layer.xml")
      if [ "$CODE" != "200" ]; then
        log "  skip $layer (HTTP $CODE — layer absent ou GWC pas init)"
        continue
      fi
      # GET current config, edit blobStoreId, PUT back
      curl -sk -u "$GS_AUTH" "$GS_URL/gwc/rest/layers/$layer.xml" -o /tmp/cur.xml
      # Inject <blobStoreId>maritime-s3</blobStoreId> if not present, else replace
      if grep -q "<blobStoreId>" /tmp/cur.xml; then
        sed -i 's|<blobStoreId>[^<]*</blobStoreId>|<blobStoreId>maritime-s3</blobStoreId>|' /tmp/cur.xml
      else
        sed -i 's|</GeoServerLayer>|<blobStoreId>maritime-s3</blobStoreId></GeoServerLayer>|' /tmp/cur.xml
      fi
      curl -sk -u "$GS_AUTH" -X PUT -H "Content-Type: application/xml" \
        --data-binary @/tmp/cur.xml \
        "$GS_URL/gwc/rest/layers/$layer.xml" \
        -o /tmp/resp -w "  $layer PUT %{http_code}\n"
    done

    log "→ GWC reload"
    curl -sk -u "$GS_AUTH" -X POST "$GS_URL/gwc/rest/reload" \
      -o /dev/null -w "  POST gwc reload %{http_code}\n" || true

    log "✓ done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maritime-gwc-s3-blobstore
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "3"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/setup.sh"]
          env:
            - name: GS_URL
              value: "http://geoserver:8080/geoserver"
            - name: GS_USER
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_USER } }
            - name: GS_PASSWORD
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_PASSWORD } }
            - name: S3_ENDPOINT
              value: "http://seaweedfs-filer:8333"
            - name: S3_BUCKET
              value: "maritime-gwc-tiles"
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: maritime-seaweedfs-s3, key: S3_ACCESS_KEY } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: maritime-seaweedfs-s3, key: S3_SECRET_KEY } }
          volumeMounts:
            - { name: script, mountPath: /scripts }
          resources:
            requests: { cpu: "50m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: script
          configMap:
            name: maritime-gwc-s3-blobstore-script
            defaultMode: 0755
{{- end }}
