{{- if .Values.gwcSatConfig.enabled }}
# Maritime — GWC config pour les layers satellite
#
# 2026-05-19 (Sylvain) : "il faut activer le cache gwc sur les layers sat,
# quitte à ce que ça soit tuilé, autant utiliser le cache. avec un ttl de 1h
# je pense ca évitera que l'on ai trop de tuiles concernant des granules qui
# n'existe plus".
#
# Pourquoi :
#  - Les sat layers ont une time-dim (7 validités J-7..J-1)
#  - Sans regexParameterFilter sur TIME, GWC ne cache QUE le default time
#    et bypass le cache pour les autres requêtes → chaque scrub = re-render
#  - expireCache=0 (default) = cache infini → tiles obsolètes restent même
#    quand le granule sous-jacent est supprimé par le retention cleanup (7j)
#
# Fix : pour les 7 sat NASA + (à venir) les 3 sat EUMETSAT cascade :
#  - regexParameterFilter sur TIME (accepte tout format ISO date/datetime)
#  - expireCache=3600 (1h) → recycle proactif
#  - expireClients=3600 (idem côté browser)
#
# Idempotent : PUT XML écrase la config existante à chaque sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maritime-gwc-sat-config-script
  namespace: {{ .Release.Namespace }}
data:
  config.sh: |
    #!/bin/sh
    # POSIX sh compatible (curlimages/curl utilise BusyBox sh, pas bash) :
    # pas d'array, juste un for ... in liste de strings.
    set -eu
    GS_URL="${GS_URL:-http://geoserver:8080/geoserver}"
    GS_AUTH="${GS_USER:-admin}:${GS_PASSWORD:-geoserver}"
    log() { echo "[$(date -u -Iseconds)] $*"; }

    # G42 (2026-05-23) — extended : 7 sat NASA + 3 sat EUMETSAT + 2 radar
    # + SST + wind/wave forecast. User feedback "activer au max GWC pour
    # décharger GS sur un max de raster (TIME, ENV, VIEWPARAMS, palettes)".
    # PUT silencieux 404 → tolère pour layers absents (sat cascade).
    for layer in \
      "aetherwx:sst-daily" \
      "aetherwx:wind-speed" \
      "aetherwx:wave-hs" \
      "aetherwx:wave-dir" \
      "aetherwx:sat-modis-true-color" \
      "aetherwx:sat-viirs-true-color" \
      "aetherwx:sat-modis-ir" \
      "aetherwx:sat-airs-air-temp" \
      "aetherwx:sat-modis-cloud-top" \
      "aetherwx:sat-modis-aerosol" \
      "aetherwx:sat-viirs-day-night" \
      "aetherwx:sat-eu-ir-rss" \
      "aetherwx:sat-global-ir-mtg" \
      "aetherwx:sat-eu-hrv-rgb" \
      "aetherwx:radar-dwd-de" \
      "aetherwx:radar-knmi-nl"; do
      log "→ GWC config $layer"
      # Vérifier si la layer existe côté GWC (sat cascade peuvent ne pas
      # encore être créés). Skip si 404.
      CODE=$(curl -sk -u "$GS_AUTH" -o /dev/null -w "%{http_code}" \
        "$GS_URL/gwc/rest/layers/$layer.xml")
      if [ "$CODE" != "200" ]; then
        log "  skip (HTTP $CODE — layer absent ou GWC pas init)"
        continue
      fi
      # G48 (2026-05-24) — DELETE l'entrée GWC d'abord pour forcer GS à la
      # régénérer depuis le catalog actuel (pattern résolu hier pour wind-speed
      # qui avait un LayerInfoImpl-* stale en RAM). Sans DELETE préalable,
      # le PUT renvoie 500 "already exists" et l'ancienne config persiste.
      curl -sk -u "$GS_AUTH" -X DELETE \
        "$GS_URL/gwc/rest/layers/$layer.xml" \
        -o /dev/null -w "  DELETE %{http_code}\n"
      # PUT config : enable + 1h TTL + regex filter TIME. XML single-line
      # pour rester dans le literal block YAML (indent ≥ 4 sinon parse fail).
      # G42 (2026-05-23) — extended parameterFilters :
      #   - STYLES        : palette switch (sst-direct, *-rainbow, *-contours, …)
      #   - TIME          : dimension time-aware (daily / hourly / sub-hourly)
      #   - ENV           : SLD env vars (contourInterval, stroke, …)
      #   - VIEWPARAMS    : SQL view params (n/a sur raster, mais cheap)
      #   - INTERPOLATIONS: bicubic resampling param (request-side vendor)
      # inMemoryCached=true → cache RAM en plus du disque pour les hot tiles.
      # G43c (2026-05-23) — STYLES en regexParameterFilter au lieu de
      # styleParameterFilter. Le style filter natif re-qualifie le nom avec
      # le workspace prefix (sst-direct → aetherwx:sst-direct) puis le
      # cherche, mais le style est enregistré sans prefix → "invalid".
      # Regex `.*` accepte tout, GS valide ensuite côté WMS (où ça marche).
      XML="<?xml version='1.0' encoding='UTF-8'?><GeoServerLayer><enabled>true</enabled><inMemoryCached>true</inMemoryCached><name>${layer}</name><mimeFormats><string>image/png</string><string>image/jpeg</string></mimeFormats><gridSubsets><gridSubset><gridSetName>EPSG:4326</gridSetName></gridSubset><gridSubset><gridSetName>EPSG:900913</gridSetName></gridSubset><gridSubset><gridSetName>EPSG:3857</gridSetName></gridSubset></gridSubsets><metaWidthHeight><int>4</int><int>4</int></metaWidthHeight><expireCache>3600</expireCache><expireClients>3600</expireClients><parameterFilters><regexParameterFilter><key>STYLES</key><defaultValue></defaultValue><regex>.*</regex></regexParameterFilter><regexParameterFilter><key>TIME</key><defaultValue></defaultValue><regex>.*</regex></regexParameterFilter><regexParameterFilter><key>ENV</key><defaultValue></defaultValue><regex>.*</regex></regexParameterFilter><regexParameterFilter><key>VIEWPARAMS</key><defaultValue></defaultValue><regex>.*</regex></regexParameterFilter><regexParameterFilter><key>INTERPOLATIONS</key><defaultValue></defaultValue><regex>.*</regex></regexParameterFilter></parameterFilters><gutter>0</gutter></GeoServerLayer>"
      curl -sk -u "$GS_AUTH" -X PUT \
        -H "Content-Type: application/xml" \
        -d "$XML" \
        "$GS_URL/gwc/rest/layers/$layer.xml" \
        -o /tmp/resp -w "  PUT %{http_code}\n"
    done

    # G42c (2026-05-23) — Direct WMS Integration via /rest/resource/gwc-gs.xml.
    # Le PUT précédent sur /gwc/rest/global ne touchait PAS le bon fichier
    # (vérifié in-pod : directWMSIntegrationEnabled resté false). La conf GS-side
    # de GWC est dans data_dir/gwc-gs.xml (NOT data_dir/gwc/geowebcache.xml).
    # Endpoint correct = /rest/resource/{path} qui fait du file CRUD sur data_dir.
    log "→ Set directWMSIntegrationEnabled=true via /rest/resource/gwc-gs.xml"
    GWC_GS_XML='<?xml version="1.0" encoding="UTF-8"?><GeoServerGWCConfig><version>1.1.0</version><directWMSIntegrationEnabled>true</directWMSIntegrationEnabled><requireTiledParameter>false</requireTiledParameter><WMSCEnabled>true</WMSCEnabled><TMSEnabled>true</TMSEnabled><securityEnabled>false</securityEnabled><cacheLayersByDefault>true</cacheLayersByDefault><cacheNonDefaultStyles>true</cacheNonDefaultStyles><metaTilingX>4</metaTilingX><metaTilingY>4</metaTilingY><gutter>0</gutter><defaultCachingGridSetIds><string>EPSG:4326</string><string>EPSG:900913</string><string>EPSG:3857</string></defaultCachingGridSetIds><defaultCoverageCacheFormats><string>image/png</string><string>image/jpeg</string></defaultCoverageCacheFormats><defaultVectorCacheFormats><string>image/png</string><string>image/jpeg</string></defaultVectorCacheFormats><defaultOtherCacheFormats><string>image/png</string><string>image/jpeg</string></defaultOtherCacheFormats></GeoServerGWCConfig>'
    curl -sk -u "$GS_AUTH" -X PUT \
      -H "Content-Type: application/xml" \
      -d "$GWC_GS_XML" \
      "$GS_URL/rest/resource/gwc-gs.xml" \
      -o /tmp/cfg-resp -w "  PUT gwc-gs.xml %{http_code}\n"

    # G42c — créer le gridset EPSG:3857 (alias de 900913, mêmes coords mais
    # code OGC officiel). MapLibre envoie SRS=EPSG:3857 → matching gridset
    # requis pour que Direct WMS Integration route vers GWC.
    log "→ Create gridset EPSG:3857 (alias 900913)"
    GRIDSET_XML='<?xml version="1.0" encoding="UTF-8"?><gridSet><name>EPSG:3857</name><srs><number>3857</number></srs><extent><coords><double>-20037508.34</double><double>-20037508.34</double><double>20037508.34</double><double>20037508.34</double></coords></extent><alignTopLeft>false</alignTopLeft><scaleDenominators><double>5.590822640287176E8</double><double>2.7954113201435876E8</double><double>1.3977056600717938E8</double><double>6.988528300358969E7</double><double>3.4942641501794845E7</double><double>1.7471320750897422E7</double><double>8735660.375448711</double><double>4367830.187724356</double><double>2183915.093862178</double><double>1091957.546931089</double><double>545978.7734655446</double><double>272989.3867327723</double><double>136494.69336638614</double><double>68247.34668319307</double><double>34123.673341596535</double><double>17061.836670798268</double><double>8530.918335399134</double><double>4265.459167699567</double><double>2132.7295838497835</double><double>1066.3647919248917</double><double>533.1823959624459</double><double>266.59119798122293</double><double>133.29559899061147</double><double>66.64779949530573</double><double>33.32389974765287</double><double>16.661949873826433</double><double>8.330974936913217</double><double>4.165487468456608</double><double>2.082743734228304</double><double>1.041371867114152</double><double>0.520685933557076</double></scaleDenominators><metersPerUnit>1.0</metersPerUnit><pixelSize>2.8E-4</pixelSize><tileHeight>256</tileHeight><tileWidth>256</tileWidth><yCoordinateFirst>false</yCoordinateFirst></gridSet>'
    curl -sk -u "$GS_AUTH" -X PUT \
      -H "Content-Type: application/xml" \
      -d "$GRIDSET_XML" \
      "$GS_URL/gwc/rest/gridsets/EPSG:3857.xml" \
      -o /tmp/grid-resp -w "  PUT gridset EPSG:3857 %{http_code}\n"

    # G45 (2026-05-23) — Enable GWC DiskQuota pour borner la taille du
    # cache disque. PVC geoserver-data = 5 GB ; quota = 2 GB max → marge
    # 3 GB pour catalog + SLDs + autres. Eviction LFU (least frequently
    # used) toutes les 10 min. Évite remplissage progressif.
    log "→ Enable GWC DiskQuota (2 GB max, LFU eviction)"
    DISKQUOTA_XML='<?xml version="1.0" encoding="UTF-8"?><org.geowebcache.diskquota.DiskQuotaConfig><enabled>true</enabled><cacheCleanUpFrequency>10</cacheCleanUpFrequency><cacheCleanUpUnits>MINUTES</cacheCleanUpUnits><maxConcurrentCleanUps>2</maxConcurrentCleanUps><globalExpirationPolicyName>LFU</globalExpirationPolicyName><globalQuota><id>0</id><bytes>2147483648</bytes></globalQuota></org.geowebcache.diskquota.DiskQuotaConfig>'
    curl -sk -u "$GS_AUTH" -X PUT \
      -H "Content-Type: application/xml" \
      -d "$DISKQUOTA_XML" \
      "$GS_URL/gwc/rest/diskquota.xml" \
      -o /tmp/quota-resp -w "  PUT diskquota %{http_code}\n"

    log "→ GS REST reload (apply gwc-gs.xml changes)"
    curl -sk -u "$GS_AUTH" -X POST "$GS_URL/rest/reload" \
      -o /dev/null -w "  POST reload %{http_code}\n" || true

    log "→ GWC reload (truncate stale cache, force re-fetch)"
    curl -sk -u "$GS_AUTH" -X POST "$GS_URL/gwc/rest/reload" \
      -o /dev/null -w "  POST gwc reload %{http_code}\n" || true

    log "✓ done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maritime-gwc-sat-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    # sync-wave 2 = après cascade WMS (wave 1) qui crée les layers
    argocd.argoproj.io/sync-wave: "2"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: maritime-gwc-sat-config
    spec:
      restartPolicy: OnFailure
      containers:
        - name: config
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/config.sh"]
          env:
            - name: GS_URL
              value: "http://geoserver:8080/geoserver"
            # 2026-05-22 fix sécu : creds via Secret maritime-shared-env.
            - name: GS_USER
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_USER } }
            - name: GS_PASSWORD
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_PASSWORD } }
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests: { cpu: "50m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: scripts
          configMap:
            name: maritime-gwc-sat-config-script
            defaultMode: 0755
{{- end }}
