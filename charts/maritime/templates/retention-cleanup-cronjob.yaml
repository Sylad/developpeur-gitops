{{- if .Values.retentionCleanup.enabled }}
# Maritime — Retention cleanup CronJob
#
# Aligne les volumes DB sur la fenêtre time-bar UI -1j/+7j (Sylvain
# 2026-05-15). TimescaleDB n'est pas installée sur le cluster CNPG :
# add_retention_policy() est un stub no-op (héritage init scripts), donc
# pas de retention automatique. On gère via un CronJob k8s qui exec
# `psql DELETE` quotidiennement.
#
# Schedule 03:30 UTC = heure creuse côté trafic AIS Europe. Le DELETE
# tourne à priorité basse vs les INSERT temps-réel — TimescaleDB-less
# vacuum manuel sur la fenêtre supprimée garde le bloat raisonnable.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maritime-retention-cleanup
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 2026-05-20 — bump à 1800s (30min) après crash récurrent OOMKill silencieux
      # sur VACUUM (ANALYZE) vessel_positions ~18M rows (3j d'arriéré accumulés
      # quand les jobs précédents fail). Le DELETE seul prend ~30-60s, le VACUUM
      # sur hypertable réclamé prend 2-5 minutes. 30min couvre les cas extrêmes.
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: psql
              # Image CNPG officielle = postgres client + cnpg utilities,
              # même version majeure que pg-data → compat protocole garantie.
              image: ghcr.io/cloudnative-pg/postgresql:16
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  export PGPASSWORD="$DB_PASSWORD"
                  echo "[retention] $(date -Iseconds) cleanup start"
                  psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" <<'SQL'
                    -- 2026-05-19 : retention obs passée à 7 jours (cf politique
                    -- data layer maritime). vessel_positions le plus volumineux
                    -- (~1.4 GB/jour) : 7j ≈ 10 GB → pg-data PVC 10Gi tight, à
                    -- bumper en parallèle (chantier pg-data resize séparé).
                    DELETE FROM vessel_positions WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM lightning_strikes WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM alerts WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM buoy_observations WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM vessels WHERE last_seen < now() - INTERVAL '7 days';
                    DELETE FROM vessel_tracks_daily WHERE day < CURRENT_DATE - INTERVAL '7 days';
                    DELETE FROM metar_observations WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM hubeau_observations WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM hubeau_piezo WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM earthquakes WHERE ts < now() - INTERVAL '7 days';
                    DELETE FROM firms_observations WHERE ts < now() - INTERVAL '7 days';
                    VACUUM (ANALYZE) vessel_positions;
                    VACUUM (ANALYZE) lightning_strikes;
                    VACUUM (ANALYZE) alerts;
                    VACUUM (ANALYZE) buoy_observations;
                    VACUUM (ANALYZE) vessels;
                  SQL
                  echo "[retention] $(date -Iseconds) cleanup done"
              env:
                # CNPG génère un Secret pg-data-app avec username/password/host/dbname.
                - name: DB_HOST
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: host } }
                - name: DB_USER
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: username } }
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: password } }
                - name: DB_NAME
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: dbname } }
              resources:
                # 2026-05-20 — bump 256Mi → 2Gi après OOMKill silencieux sur
                # VACUUM (ANALYZE) vessel_positions (18M rows accumulés sur 3j).
                # PostgreSQL VACUUM utilise jusqu'à maintenance_work_mem (64MB
                # default) × parallel_workers, mais le buffer cache + work
                # buffers gonflent au-delà sur grosses hypertables.
                requests: { cpu: "50m",  memory: "128Mi" }
                limits:   { cpu: "1",    memory: "2Gi" }
            # ─── 2026-05-19 — cleanup fichiers /coverage selon politique data layer ───
            # Obs (sst-daily, sat-*) : delete fichiers > 1 jour mtime
            # Forecast (wind*, wave-*) : delete fichiers dont valid_time (extraite
            #   du nom YYYYMMDDTHHMMSSZ) est < J-1 OU > J+7. Géré par les fetchers
            #   en autonomie pour wind/wave (WEATHER_RETENTION_DAYS=7). Cette tâche
            #   couvre les rasters Sat (1j) et un filet de sécurité.
            - name: coverage-cleanup
              # debian:trixie-slim au lieu d'alpine:3.20 — BusyBox date n'accepte
              # PAS la syntaxe GNU `date -d '7 days ago'`, ça fait planter le
              # container et la CronJob remonte Failed (debug 2026-05-21).
              # +25MB pull mais 1×/jour donc négligeable.
              image: debian:trixie-slim
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "[coverage-cleanup] $(date -Iseconds) start"
                  # Obs rasters : 7 jours de retention (politique 2026-05-19)
                  for d in /coverage/sat-* /coverage/sst-daily; do
                    [ -d "$d" ] || continue
                    find "$d" -maxdepth 1 -name "*.tif" -mtime +7 -print -delete || true
                  done
                  # Forecast rasters : retention 7j past + 7j future basée sur
                  # le timestamp dans le nom de fichier (YYYYMMDDTHHMMSSZ).
                  # Algo : extract YYYYMMDD, compare à J-7 et J+7.
                  PAST=$(date -u -d '7 days ago' +%Y%m%d)
                  FUTURE=$(date -u -d '7 days' +%Y%m%d)
                  for d in /coverage/wind-speed /coverage/wind-speed-arpege /coverage/wind-speed-arome /coverage/wind-speed-gfs /coverage/wave-hs /coverage/wave-dir /coverage/glofas; do
                    [ -d "$d" ] || continue
                    for f in "$d"/*.tif; do
                      [ -f "$f" ] || continue
                      # Extract YYYYMMDD du basename via sed
                      ts=$(basename "$f" | sed -nE 's/.*_([0-9]{8})T[0-9]{6}Z\.tif$/\1/p')
                      [ -z "$ts" ] && continue
                      if [ "$ts" \< "$PAST" ] || [ "$ts" \> "$FUTURE" ]; then
                        echo "delete $f (ts=$ts, past=$PAST, future=$FUTURE)"
                        rm -f "$f"
                      fi
                    done
                  done
                  echo "[coverage-cleanup] $(date -Iseconds) done"
              volumeMounts:
                - name: coverage-data
                  mountPath: /coverage
              resources:
                requests: { cpu: "10m",  memory: "16Mi" }
                limits:   { cpu: "200m", memory: "64Mi" }
          volumes:
            - name: coverage-data
              persistentVolumeClaim:
                claimName: maritime-coverage
{{- end }}
