{{- if .Values.retentionCleanup.enabled }}
# Maritime — Retention cleanup CronJob
#
# Aligne les volumes DB sur la fenêtre time-bar UI -1j/+7j (Sylvain
# 2026-05-15). TimescaleDB n'est pas installée sur le cluster CNPG :
# add_retention_policy() est un stub no-op (héritage init scripts), donc
# pas de retention automatique. On gère via un CronJob k8s qui exec
# `psql DELETE` quotidiennement.
#
# Schedule 03:30 UTC = heure creuse côté trafic AIS Europe. Le DELETE
# tourne à priorité basse vs les INSERT temps-réel — TimescaleDB-less
# vacuum manuel sur la fenêtre supprimée garde le bloat raisonnable.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maritime-retention-cleanup
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: psql
              # Image CNPG officielle = postgres client + cnpg utilities,
              # même version majeure que pg-data → compat protocole garantie.
              image: ghcr.io/cloudnative-pg/postgresql:16
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  export PGPASSWORD="$DB_PASSWORD"
                  echo "[retention] $(date -Iseconds) cleanup start"
                  psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" <<'SQL'
                    DELETE FROM vessel_positions WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM lightning_strikes WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM alerts WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM buoy_observations WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM vessels WHERE last_seen < now() - INTERVAL '1 day';
                    DELETE FROM vessel_tracks_daily WHERE day < CURRENT_DATE - INTERVAL '1 day';
                    DELETE FROM metar_observations WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM hubeau_observations WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM hubeau_piezo WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM earthquakes WHERE ts < now() - INTERVAL '1 day';
                    DELETE FROM firms_observations WHERE ts < now() - INTERVAL '1 day';
                    VACUUM (ANALYZE) vessel_positions;
                    VACUUM (ANALYZE) lightning_strikes;
                    VACUUM (ANALYZE) alerts;
                    VACUUM (ANALYZE) buoy_observations;
                    VACUUM (ANALYZE) vessels;
                  SQL
                  echo "[retention] $(date -Iseconds) cleanup done"
              env:
                # CNPG génère un Secret pg-data-app avec username/password/host/dbname.
                - name: DB_HOST
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: host } }
                - name: DB_USER
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: username } }
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: password } }
                - name: DB_NAME
                  valueFrom: { secretKeyRef: { name: pg-data-app, key: dbname } }
              resources:
                requests: { cpu: "50m",  memory: "64Mi" }
                limits:   { cpu: "500m", memory: "256Mi" }
            # ─── 2026-05-19 — cleanup fichiers /coverage selon politique data layer ───
            # Obs (sst-daily, sat-*) : delete fichiers > 1 jour mtime
            # Forecast (wind*, wave-*) : delete fichiers dont valid_time (extraite
            #   du nom YYYYMMDDTHHMMSSZ) est < J-1 OU > J+7. Géré par les fetchers
            #   en autonomie pour wind/wave (WEATHER_RETENTION_DAYS=7). Cette tâche
            #   couvre les rasters Sat (1j) et un filet de sécurité.
            - name: coverage-cleanup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "[coverage-cleanup] $(date -Iseconds) start"
                  # Obs rasters : 1 jour de retention
                  for d in /coverage/sat-* /coverage/sst-daily; do
                    [ -d "$d" ] || continue
                    find "$d" -maxdepth 1 -name "*.tif" -mtime +1 -print -delete || true
                  done
                  # Forecast rasters : retention 1j past + 7j future basée sur
                  # le timestamp dans le nom de fichier (YYYYMMDDTHHMMSSZ).
                  # Algo : extract YYYYMMDD, compare à J-1 et J+7.
                  PAST=$(date -u -d '1 day ago' +%Y%m%d)
                  FUTURE=$(date -u -d '7 days' +%Y%m%d)
                  for d in /coverage/wind-speed /coverage/wind-speed-arpege /coverage/wind-speed-arome /coverage/wind-speed-gfs /coverage/wave-hs /coverage/wave-dir; do
                    [ -d "$d" ] || continue
                    for f in "$d"/*.tif; do
                      [ -f "$f" ] || continue
                      # Extract YYYYMMDD du basename via sed
                      ts=$(basename "$f" | sed -nE 's/.*_([0-9]{8})T[0-9]{6}Z\.tif$/\1/p')
                      [ -z "$ts" ] && continue
                      if [ "$ts" \< "$PAST" ] || [ "$ts" \> "$FUTURE" ]; then
                        echo "delete $f (ts=$ts, past=$PAST, future=$FUTURE)"
                        rm -f "$f"
                      fi
                    done
                  done
                  echo "[coverage-cleanup] $(date -Iseconds) done"
              volumeMounts:
                - name: coverage-data
                  mountPath: /coverage
              resources:
                requests: { cpu: "10m",  memory: "16Mi" }
                limits:   { cpu: "200m", memory: "64Mi" }
          volumes:
            - name: coverage-data
              persistentVolumeClaim:
                claimName: maritime-coverage
{{- end }}
