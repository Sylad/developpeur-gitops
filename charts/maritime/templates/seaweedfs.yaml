{{- if .Values.seaweedfs.enabled }}
# Maritime — SeaweedFS (G57)
#
# 2026-05-24 — Sprint cluster-ready : déploie SeaweedFS comme storage
# distribué S3-compatible pour 2 usages :
#   - bucket `maritime-gwc-tiles` : cache GWC partagé entre N replicas GS
#   - bucket `maritime-coverage` : GeoTIFF ImageMosaic (G59 migration)
#
# Architecture homelab single-node :
#   master (1 pod) ─┬─ volume (1 pod, ~100GB PVC Longhorn)
#                   └─ filer (1 pod, expose S3 :8333 + filer :8888)
#
# Cluster scale-up : volume replicas N pour redondance, master+filer
# restent en single (leader election si vraiment besoin HA).
#
# Pattern PRO validé chez Sylvain : 3 replicas GS + SeaweedFS + RabbitMQ
# JMS catalog sync. Aetherwx vise le même setup en G60.

# ─── Secret S3 credentials ──────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: maritime-seaweedfs-s3
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  S3_ACCESS_KEY: {{ .Values.seaweedfs.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.seaweedfs.s3SecretKey | quote }}
  # Config S3 IAM en JSON pour bootstrap filer-S3 (lu via -iam.file)
  iam-config.json: |
    {
      "identities": [
        {
          "name": "maritime",
          "credentials": [
            {
              "accessKey": "{{ .Values.seaweedfs.s3AccessKey }}",
              "secretKey": "{{ .Values.seaweedfs.s3SecretKey }}"
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
# ─── PVC volume server (data persistance) ───────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-volume-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.seaweedfs.volumeSize | default "100Gi" }}
---
# ─── PVC filer metadata (LevelDB) ───────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-filer-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# ─── Master deployment ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-master
  namespace: {{ .Release.Namespace }}
  labels: { app: seaweedfs-master }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: seaweedfs-master }
  template:
    metadata:
      labels: { app: seaweedfs-master }
    spec:
      containers:
        - name: master
          image: chrislusf/seaweedfs:3.73
          imagePullPolicy: IfNotPresent
          # Master expose port 9333 HTTP + 19333 gRPC (default).
          # volumeSizeLimitMB=1024 = volume server roll over à 1Gi
          # (5 sub-volumes pour 5Gi total cap).
          command:
            - /bin/sh
            - -c
            - >-
              /usr/bin/weed master
              -port=9333
              -mdir=/data
              -volumeSizeLimitMB=1024
              -defaultReplication=000
          ports:
            - { containerPort: 9333, name: http }
            - { containerPort: 19333, name: grpc }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /cluster/status, port: 9333 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-master
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app: seaweedfs-master }
  ports:
    - { name: http, port: 9333, targetPort: 9333 }
    - { name: grpc, port: 19333, targetPort: 19333 }
---
# ─── Volume server deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-volume
  namespace: {{ .Release.Namespace }}
  labels: { app: seaweedfs-volume }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: seaweedfs-volume }
  template:
    metadata:
      labels: { app: seaweedfs-volume }
    spec:
      containers:
        - name: volume
          image: chrislusf/seaweedfs:3.73
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - >-
              /usr/bin/weed volume
              -mserver=seaweedfs-master:9333
              -port=8080
              -dir=/data
              -max=100
              -dataCenter=dc1
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 18080, name: grpc }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1500m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /status, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-volume-data
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-volume
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app: seaweedfs-volume }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 18080, targetPort: 18080 }
---
# ─── Filer deployment (expose S3 :8333) ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-filer
  namespace: {{ .Release.Namespace }}
  labels: { app: seaweedfs-filer }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: seaweedfs-filer }
  template:
    metadata:
      labels: { app: seaweedfs-filer }
    spec:
      containers:
        - name: filer
          image: chrislusf/seaweedfs:3.73
          imagePullPolicy: IfNotPresent
          # Filer = LevelDB metadata local + S3 API on :8333.
          # -s3.config monte le IAM config depuis le Secret.
          command:
            - /bin/sh
            - -c
            - >-
              /usr/bin/weed filer
              -master=seaweedfs-master:9333
              -port=8888
              -s3
              -s3.port=8333
              -s3.config=/iam/iam-config.json
              -metricsPort=9327
          ports:
            - { containerPort: 8888, name: http }
            - { containerPort: 8333, name: s3 }
            - { containerPort: 9327, name: metrics }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: iam, mountPath: /iam, readOnly: true }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1000m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8888 }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-filer-data
        - name: iam
          secret:
            secretName: maritime-seaweedfs-s3
            items:
              - { key: iam-config.json, path: iam-config.json }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-filer
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app: seaweedfs-filer }
  ports:
    - { name: http, port: 8888, targetPort: 8888 }
    - { name: s3, port: 8333, targetPort: 8333 }
    - { name: metrics, port: 9327, targetPort: 9327 }
---
# ─── Bucket init Job (PostSync) ─────────────────────────────────────
# Crée les 2 buckets via S3 API du filer dès qu'il est ready.
# Idempotent : `mc mb --ignore-existing` ne plante pas si bucket existe.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maritime-seaweedfs-bucket-init-script
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
data:
  init.sh: |
    #!/bin/sh
    set -eu
    # Wait filer ready (S3 endpoint)
    for i in $(seq 1 60); do
      if wget -qO- http://seaweedfs-filer:8333/ 2>/dev/null | head -1 | grep -q "<?xml\|ListAllMyBucketsResult\|<Error"; then
        echo "[$(date)] filer S3 ready"; break
      fi
      echo "[$(date)] wait filer S3... ($i/60)"; sleep 2
    done
    # Configure mc alias
    mc alias set local http://seaweedfs-filer:8333 "$S3_ACCESS_KEY" "$S3_SECRET_KEY" --api S3v4
    # Create buckets
    for bucket in maritime-gwc-tiles maritime-coverage; do
      mc mb --ignore-existing local/$bucket
      echo "✓ bucket $bucket ready"
    done
    mc ls local/
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maritime-seaweedfs-bucket-init
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/init.sh"]
          env:
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: maritime-seaweedfs-s3, key: S3_ACCESS_KEY } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: maritime-seaweedfs-s3, key: S3_SECRET_KEY } }
          volumeMounts:
            - { name: script, mountPath: /scripts }
          resources:
            requests: { cpu: "50m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: script
          configMap:
            name: maritime-seaweedfs-bucket-init-script
            defaultMode: 0755
{{- end }}
