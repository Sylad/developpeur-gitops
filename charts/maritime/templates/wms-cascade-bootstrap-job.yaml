{{- if .Values.wmsCascadeBootstrap.enabled }}
# Maritime — WMS Cascade Bootstrap
#
# Provisionne déclarativement les WMS stores cascade + leurs WMS layers
# côté GeoServer pour les sources externes haute cadence : EUMETSAT View
# Service (MSG/MTG sat IR temps réel), DWD radar Allemagne, KNMI radar
# Pays-Bas. Tourne en ArgoCD PostSync — chaque sync re-vérifie la config
# (idempotent : DELETE+POST clean re-set).
#
# Cascading WMS = notre GS proxie le WMS upstream, port la time-dim, et
# expose `maritime:<name>` au frontend. Respecte la règle "tout passe par
# GS" (Sylvain 2026-05-16). Pas de duplication de tiles côté nous — chaque
# GetMap est forwardé à l'upstream avec son cache GWC en sortie.
#
# 2026-05-19 — bash+curl inline pour éviter une nouvelle image GHCR.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maritime-wms-cascade-bootstrap-script
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  bootstrap.sh: |
    #!/bin/sh
    # POSIX sh (BusyBox de curlimages/curl). Idempotent : DELETE old + POST
    # fresh. GS retourne 201 sur création, 404 sur DELETE si pas existant.
    #
    # 2026-05-20 — switch XML → JSON après bug XStream StreamException sur
    # POST wmsstore XML (XStream WMSStoreInfoConverter cassé sur GS 2.28.3).
    # Le payload JSON contourne XStream et utilise le converter Jackson.
    set -eu

    GS_URL="${GS_URL:-http://geoserver:8080/geoserver}"
    GS_AUTH="${GS_USER:-admin}:${GS_PASSWORD:-geoserver}"
    WS="${GS_WORKSPACE:-aetherwx}"

    log() { echo "[$(date -u -Iseconds)] $*"; }

    # G70 (2026-06-15) — fonctions paramétrées sur le workspace pour
    # supporter NASA GIBS qui vit dans `aetherwx-sat` (split G56), à côté
    # des cascades EUMETSAT/DWD/KNMI qui restent dans `aetherwx`.
    create_wmsstore() {
      ws="$1"
      name="$2"
      capabilities_url="$3"
      log "→ wmsstore $ws:$name"
      # DELETE recurse (supprime store + layers cascade liés). Idempotent.
      curl -sk -u "$GS_AUTH" -X DELETE \
        "$GS_URL/rest/workspaces/$ws/wmsstores/$name?recurse=true" \
        -o /dev/null -w "  DELETE %{http_code}\n" || true
      # POST JSON (bypass XStream XML bug)
      curl -sk -u "$GS_AUTH" -X POST -H "Content-Type: application/json" \
        -d "{\"wmsStore\":{\"name\":\"$name\",\"type\":\"WMS\",\"enabled\":true,\"workspace\":{\"name\":\"$ws\"},\"capabilitiesURL\":\"$capabilities_url\",\"maxConnections\":6,\"readTimeout\":60,\"connectTimeout\":30}}" \
        "$GS_URL/rest/workspaces/$ws/wmsstores" \
        -o /tmp/resp -w "  POST %{http_code}\n"
      head -c 200 /tmp/resp; echo
    }

    publish_cascade_layer() {
      ws="$1"
      store="$2"
      native_name="$3"   # ex: msg_rss:ir039_nrt
      layer_name="$4"    # ex: sat-eu-ir-rss (URL-safe + lowercase-dash)
      title="$5"
      log "→ wmslayer cascade $ws:$layer_name (← $store:$native_name)"
      # POST JSON avec advertised=true direct (PUT advertised=true après
      # création trigger un bug XStream WMSLayerInfoConverter HTTP 500).
      curl -sk -u "$GS_AUTH" -X POST -H "Content-Type: application/json" \
        -d "{\"wmsLayer\":{\"name\":\"$layer_name\",\"nativeName\":\"$native_name\",\"title\":\"$title\",\"enabled\":true,\"advertised\":true}}" \
        "$GS_URL/rest/workspaces/$ws/wmsstores/$store/wmslayers" \
        -o /tmp/resp -w "  POST %{http_code}\n"
      head -c 300 /tmp/resp; echo
    }

    # ─── 1. Stores cascade dans workspace `aetherwx` ───────────────
    create_wmsstore "aetherwx" "eumetsat-view" \
      "https://view.eumetsat.int/geoserver/ows?service=WMS&version=1.3.0&request=GetCapabilities"

    create_wmsstore "aetherwx" "dwd-maps" \
      "https://maps.dwd.de/geoserver/ows?service=WMS&version=1.3.0&request=GetCapabilities"

    create_wmsstore "aetherwx" "knmi-geo" \
      "https://geoservices.knmi.nl/wms?service=WMS&version=1.3.0&request=GetCapabilities&DATASET=RADAR"

    # ─── 2. Store cascade NASA GIBS dans workspace `aetherwx-sat` ───
    # G70 (2026-06-15) : remplace les 7 coveragestores file:///coverage/sat-*
    # (anciens, jamais peuplés — aucun sat-fetcher dans services/) par un
    # cascade WMS vers le service GIBS officiel. Stateless, pas de PVC.
    create_wmsstore "aetherwx-sat" "nasa-gibs" \
      "https://gibs.earthdata.nasa.gov/wms/epsg3857/best/wms.cgi?service=WMS&version=1.3.0&request=GetCapabilities"

    # ─── 3. Layers cascade publiés ─────────────────────────────────
    # Satellites EUMETSAT (workspace aetherwx)
    publish_cascade_layer "aetherwx" "eumetsat-view" "msg_rss:ir039_nrt" \
      "sat-eu-ir-rss" \
      "Sat IR Europe Rapid Scan 5min (MSG SEVIRI 3.9μm)"

    publish_cascade_layer "aetherwx" "eumetsat-view" "mtg_fd:ir105_hrfi" \
      "sat-global-ir-mtg" \
      "Sat IR global 10min (MTG FCI 10.5μm)"

    publish_cascade_layer "aetherwx" "eumetsat-view" "msg_fes:rgb_eview" \
      "sat-eu-hrv-rgb" \
      "Sat HRV RGB Europe 15min (MSG SEVIRI visible day)"

    # Radars (workspace aetherwx)
    publish_cascade_layer "aetherwx" "dwd-maps" "dwd:Radar_rv_product_1x1km_ger" \
      "radar-dwd-de" \
      "Radar Allemagne 1km 5min (DWD)"

    publish_cascade_layer "aetherwx" "knmi-geo" "RAD_NL25_PCP_CM" \
      "radar-knmi-nl" \
      "Radar Pays-Bas 5min (KNMI)"

    # NASA GIBS (workspace aetherwx-sat) — G70 2026-06-15
    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "MODIS_Terra_CorrectedReflectance_TrueColor" "sat-modis-true-color" \
      "Sat MODIS True Color (Terra, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "VIIRS_SNPP_CorrectedReflectance_TrueColor" "sat-viirs-true-color" \
      "Sat VIIRS True Color (SNPP, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "MODIS_Terra_Brightness_Temp_Band31_Day" "sat-modis-ir" \
      "Sat MODIS IR Band31 (Terra, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "AIRS_L2_Surface_Air_Temperature_Day" "sat-airs-air-temp" \
      "Sat AIRS Surface Air Temp (Aqua, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "MODIS_Terra_Cloud_Top_Temp_Day" "sat-modis-cloud-top" \
      "Sat MODIS Cloud Top Temp (Terra, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "MODIS_Combined_Value_Added_AOD" "sat-modis-aerosol" \
      "Sat MODIS Aerosol AOD (combined, daily)"

    publish_cascade_layer "aetherwx-sat" "nasa-gibs" \
      "VIIRS_SNPP_DayNightBand_ENCC" "sat-viirs-day-night" \
      "Sat VIIRS Day/Night Band (SNPP, daily)"

    # ─── 4. Reload GS pour invalider les caches catalog ────────────
    log "→ reload GS"
    curl -sk -u "$GS_AUTH" -X POST "$GS_URL/rest/reload" -o /dev/null -w "  POST reload %{http_code}\n"

    log "✓ done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maritime-wms-cascade-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: maritime-wms-cascade-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/bootstrap.sh"]
          env:
            - name: GS_URL
              value: "http://geoserver:8080/geoserver"
            # 2026-05-22 fix sécu : creds via Secret maritime-shared-env.
            - name: GS_USER
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_USER } }
            - name: GS_PASSWORD
              valueFrom: { secretKeyRef: { name: maritime-shared-env, key: GEOSERVER_ADMIN_PASSWORD } }
            - name: GS_WORKSPACE
              value: aetherwx
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests: { cpu: "50m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: script
          configMap:
            name: maritime-wms-cascade-bootstrap-script
            defaultMode: 0755
{{- end }}
