# Maritime services — preprod local k3s.
#
# Stateful deps (pg-catalog, pg-data, rmq) sont dans le chart maritime-stateful
# du même repo. Les Secrets CNPG `pg-data-app` et RMQ `rmq-default-user` sont
# auto-générés par les operators et référencés par les services ci-dessous.

services:
  # ─── API NestJS (core backend) ────────────────────────────────────
  api:
    enabled: true
    image: ghcr.io/sylad/aetherwx-api
    # v2-debian : base Debian bookworm-slim au lieu d'Alpine — fix
    # undici fetch() qui timeoutait sur Alpine 3.23 musl libc en HTTPS
    # externe (USGS, METAR, hubeau-débits, etc.). https.request() marche
    # mais le code utilise fetch() partout → seul recours : base glibc.
    tag: sha-ec27b97  # Phase 1 map-configs 2026-06-17
    port: 3010
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }
    env:
      NODE_ENV: production
      PORT: "3010"
      CORS_ORIGIN: "https://maritime.dev.local"
      JWT_SECRET: dev-secret-change-me-in-prod
      JWT_EXPIRES_IN: "24h"
      GEOSERVER_URL: "http://geoserver:8080/geoserver"
      # 2026-05-22 — GEOSERVER_ADMIN_USER + GEOSERVER_ADMIN_PASSWORD lus via
      # Secret maritime-shared-env (not commit). Repo PUBLIC → never put
      # password in clair ici. Cf code-review SEC-1.
      GEOSERVER_WORKSPACE: aetherwx  # Sprint 0 hotfix URL paths /geoserver/aetherwx/ (2026-05-21)
      # 2026-05-23 — override le GRIB_PARSER_URL hérité du secret maritime-shared-env
      # (= http://192.168.1.26:8500 d'avant la migration K8s). En cluster il
      # faut viser le service grib-parser.maritime.svc.cluster.local:8500.
      GRIB_PARSER_URL: "http://grib-parser:8500"
      PALETTE_LIMIT_PER_USER: "5"
      ADMIN_EMAIL: sylvain.ladoire@gmail.com
      ADMIN_USERNAME: sylvain

  # ─── ais-ingester (aisstream.io WebSocket → publish RMQ ais.raw) ──
  # Source du flux AIS live. Secret K8s `maritime-shared-env` (créé hors
  # Git, voir HANDOFF.md) contient AISSTREAM_API_KEY + AIS_BBOX_* +
  # GEOSERVER_ADMIN_* + CANDHIS_API_KEY + GRIB_PARSER_URL.
  # v2-debian : base Debian (cf fix undici/Alpine).
  aisIngester:
    enabled: true
    image: ghcr.io/sylad/aetherwx-ais-ingester
    tag: sha-6c23593   # AIS SSL bypass aisstream.io (2026-05-21)
    replicas: 1
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }
    env: {}  # BBox + AISSTREAM_API_KEY viennent du secret maritime-shared-env
    secretName: maritime-shared-env

  # ─── ais-decoder (consume RMQ → INSERT PG) ────────────────────────
  aisDecoder:
    enabled: true
    image: ghcr.io/sylad/aetherwx-ais-decoder
    tag: sha-54d7070   # Sprint 0 rebuild dual-tag (2026-05-21)
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── alerts-engine (consume RMQ + PG hypertable) ──────────────────
  alertsEngine:
    enabled: true
    image: ghcr.io/sylad/aetherwx-alerts-engine
    tag: sha-610cae9
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }
    env:
      WIND_SPEED_ALERT_THRESHOLD: "10"
      LIGHTNING_PROXIMITY_KM: "10"
      COOLDOWN_MIN: "30"

  # ─── track-builder (cron hourly) ──────────────────────────────────
  trackBuilder:
    enabled: true
    image: ghcr.io/sylad/aetherwx-track-builder
    tag: sha-54d7070   # Sprint 0 rebuild dual-tag (2026-05-21)
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── lightning-fetcher (WebSocket lightningmaps.org → RMQ) ────────
  # Stream live des éclairs en Europe. Single replica (WSS).
  # v2-debian : fix undici/Alpine.
  lightningFetcher:
    enabled: true
    image: ghcr.io/sylad/aetherwx-lightning-fetcher
    tag: sha-dcb0613
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── buoy-fetcher (EMODnet WFS → seed bouées quotidien) ───────────
  # Cron quotidien 1440 min. Python 3.12-slim (glibc), pas concerné
  # par bug undici. Bbox Europe étroite par défaut côté code.
  buoyFetcher:
    enabled: true
    image: ghcr.io/sylad/aetherwx-buoy-fetcher
    tag: latest
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── grib-parser (Python sidecar pour parser GRIB/NetCDF) ────────
  # Service HTTP appelé par maritime-api orchestrator pour décoder
  # les fichiers GRIB téléchargés par weather-fetcher*. Image GDAL
  # (osgeo/gdal base, ~700MB) — pas concerné par bug undici.
  gribParser:
    enabled: true
    image: ghcr.io/sylad/aetherwx-grib-parser
    tag: sha-b68671c   # 2026-05-23 fix workspace default 'aetherwx'
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── weather-fetcher (GFS wind + wave forecasts, cron 4x/jour) ────
  # Écrit GeoTIFF dans /coverage/wind-speed, /coverage/wave-hs,
  # /coverage/wave-dir partagé via hostPath /var/lib/maritime/coverage
  # (single-node k3s = hostPath OK, à industrialiser via RWX/SeaweedFS).
  weatherFetcher:
    enabled: true
    image: ghcr.io/sylad/aetherwx-weather-fetcher
    tag: sha-b0f45dd  # G69c nearestMatchEnabled 2026-05-28
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  weatherFetcherArpege:
    enabled: true
    image: ghcr.io/sylad/aetherwx-weather-fetcher-arpege
    tag: sha-9d594e2   # G47 workspace via env var (2026-05-23)
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  weatherFetcherArome:
    enabled: true
    image: ghcr.io/sylad/aetherwx-weather-fetcher-arome
    tag: sha-9d594e2   # G47 workspace via env var (2026-05-23)
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── sst-fetcher (NOAA OISST cron 06:00 UTC) ──────────────────────
  # v2-prelim : fallback _preliminary.nc → URL fix pour les data <21j
  # (NOAA publie d'abord preliminary, finalise 14-21j plus tard).
  sstFetcher:
    enabled: true
    image: ghcr.io/sylad/aetherwx-sst-fetcher
    tag: sha-9d594e2   # G47 workspace via env var (2026-05-23)
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── glofas-fetcher (Copernicus CDS GloFAS forecast crues, cron 6h) ───
  # Pull NetCDF cems-glofas-forecast 7×24h leadtimes × 3 thresholds via
  # cdsapi → écrit GeoTIFFs dans /coverage/glofas/<run>/<threshold>/.
  # Triggered par Argo CronWorkflow `glofas-refresh` (cf Task 8).
  # Secret K8s manuel `glofas-cds-credentials` (cdsapirc) doit exister.
  glofasFetcher:
    # 2026-05-27 — re-enabled après fix uvicorn `--no-access-log` (commit
    # 1983f21). G66d avait disabled à cause de crash --log-config /dev/null.
    enabled: true
    image: ghcr.io/sylad/aetherwx-glofas-fetcher
    tag: sha-60c442f   # gs_bootstrap idempotent (2026-05-28)
    replicas: 1
    resources:
      requests: { cpu: "200m", memory: "512Mi" }
      limits:   { cpu: "2",    memory: "4Gi" }

  # ─── GeoServer (cluster GIS) ──────────────────────────────────────
  # JDBCConfig pointe sur pg-catalog (175 rows déjà migrés depuis NAS).
  # PVC data_dir RWO single-replica preprod. Phase prod = StickySession + N replicas.
  geoserver:
    enabled: true
    image: ghcr.io/sylad/aetherwx-geoserver
    tag: sha-8e866b9  # G69 4 SLDs GFS atmos 2026-05-28
    # le pod sha-e10fc61 booted en 10+min (JDBCResourceStore copy datadir →
    # DB blob saturation), startup probe killed. À investiguer avant re-bump :
    # peut-être plugin maritime-gwc-init crée trop de catalog.save() qui
    # déclenchent Hazelcast event publish lents.
    # 2026-05-17 soir : scale-down à 1 replica après bug "layers disparaissent"
    # (Sylvain "laisse qu'un réplicas, c'est lamentable, mais pour l'instant
    # on gère que dalle"). Cause profonde = drift entre les 2 pods GS quand
    # un pod subit GC pause / perd temporairement son cache catalog → 404
    # intermittents → OL EncodingError → hide layer. 1 replica = pas de drift.
    # À revoir quand hz-cluster baked + RBAC OK (mais pas ce week-end).
    # G60 (2026-05-24) — Sprint cluster : bump à 2 replicas avec hz-cluster
    # synchronisé. 3 = OOM sur Mini-Blue 24Gi (3 × 7Gi pod = 21Gi + reste).
    # Migrate Hetzner CAX41 32Gi → 3+ replicas possible. Heap réduit à 4g
    # pour fit 2 replicas (2 × (4g+3g overhead) = 14Gi).
    replicas: 2
    dataSize: 5Gi
    # 2026-05-19 — SINGLE SOURCE OF TRUTH pour la mémoire JVM. Le template
    # geoserver.yaml lit `heap` pour les 2 -Xmx (JAVA_OPTS + EXTRA_JAVA_OPTS)
    # ET calcule automatiquement limits.memory = heap + 1Gi (marge off-heap
    # pour metaspace + JAI native + threads). Plus de drift possible entre
    # JVM heap et K8s pod limit.
    #
    # Format `heap` : "Ng" entier (ex "4g", "6g", "8g"). Ne pas mettre "6.5g"
    # ou "6144m" — le template parse via trimSuffix "g" + int.
    #
    # Mini-Blue 15Gi RAM total : heap 8g → pod limit 9Gi → laisse 6Gi pour
    # pg-data + rmq + frontend + ais-decoder + alerts + autres pods.
    #
    # 2026-05-23 — bump 6g → 8g après OOM-kill (pod restart 1× en 11h)
    # + saturation perm 100% (7146Mi/7168Mi) → GC thrashing visible côté user
    # ("perfs GS molles" alors que client 144fps). Mini-Blue 15Gi a la marge.
    # G60 (2026-05-24) — réduit 8g → 4g pour fit 2 replicas sur Mini-Blue
    # 24Gi (2 × 7Gi pod = 14Gi). hz-cluster sync compense le cache plus petit.
    # Migrate Hetzner CAX41 32Gi → restore 8g+ par replica.
    heap: "4g"
    resources:
      requests: { cpu: "500m", memory: "2Gi" }
      # 2026-05-23 — bump 2 → 4 cores : GS pegged 1994m/2000m pendant
      # animations + multi-tile concurrent (bicubic = heavy CPU). Causait
      # 504 sporadiques côté browser ("seul le curseur bouge" pendant
      # play). Mini-Blue node = 16 cores, marge confortable.
      limits:   { cpu: "4" }
      # limits.memory est calculé dans le template = heap + 1Gi.

  # ─── Style bootstrap (ArgoCD PostSync Job) ────────────────────────
  # Provisionne déclarativement les styles SLD custom (wind-speed-idw,
  # etc.) + leurs default-style associations côté GeoServer. Tourne
  # post-sync sur chaque cluster → 2 clusters restent synchros sans
  # drift entre REST manuel sur l'un et oubli sur l'autre.
  styleBootstrap:
    # 2026-05-23 (G29) — Disabled : SLDs uploadés manuellement via
    # kubectl exec curl directement dans le pod GS (sst-direct, wind-speed-idw,
    # *-rainbow stubs). Image ghcr.io/sylad/aetherwx-style-bootstrap:sha-4c4a077
    # n'existe pas → bloque ArgoCD PostSync en ImagePullBackOff. Re-enable
    # quand l'image sera buildée (workflow .github/workflows/style-bootstrap.yml).
    enabled: false
    image: ghcr.io/sylad/aetherwx-style-bootstrap
    tag: sha-60c442f   # + glofas-discharge SLD (2026-05-28)

  # ─── GS Workspace Rename (Sprint 0 — 2026-05-21) ──────────────────
  # Job PreSync idempotent qui renomme atomiquement le workspace GS
  # `maritime` → `aetherwx`. Toggle ON pour le rollout one-shot.
  # Une fois confirmé en prod, peut rester ON (idempotent no-op si
  # `aetherwx` existe déjà).
  gsWorkspaceRename:
    enabled: true


  # ─── Frontend Angular SPA + nginx (AetherWX brand) ────────────────
  frontend:
    enabled: true
    image: ghcr.io/sylad/aetherwx-frontend
    tag: sha-ec27b97  # Phase 1 map-configs 2026-06-17
    replicas: 1
    port: 80
    resources:
      requests: { cpu: "10m",  memory: "16Mi" }
      limits:   { cpu: "100m", memory: "64Mi" }

ingress:
  host: maritime.dev.local
  className: nginx
  tls:
    enabled: true
    secretName: maritime-tls
  annotations:
    cert-manager.io/cluster-issuer: mkcert-ca-issuer
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

# ─── Storage partagé /coverage et /wind-arrows ──────────────────────
# Migré de hostPath → PVC RWX Longhorn (vague 2 industrialisation).
# Requiert Longhorn installé sur le cluster (cf bootstrap script).
coverage:
  enabled: true
  storageClass: longhorn
  coverageSize: 50Gi
  windArrowsSize: 2Gi

# ─── WMS Cascade Bootstrap (PostSync Job) ───────────────────────────
# Provisionne les wmsstores + wmslayers cascade pour les sources externes
# haute cadence : EUMETSAT View (sat IR Europe + global), DWD radar, KNMI
# radar. Tourne après chaque sync ArgoCD (idempotent DELETE + POST).
# Permet de respecter la règle "tout passe par GeoServer" pour ces layers
# externes sans dupliquer le storage (cascade = proxy live).
wmsCascadeBootstrap:
  enabled: true

# ─── Sat workspace split (G56) ──────────────────────────────────────
# Migration des 7 NASA GIBS sat layers (sat-modis-*, sat-viirs-*,
# sat-airs-*) vers workspace dédié `aetherwx-sat`. GetCap principal
# 4× plus rapide (passe de 36s cold à ~5-10s estimé).
satWorkspaceSplit:
  # G56 — Job désactivé après exécution manuelle réussie (2026-05-24).
  # Migration SQL idempotente : si fresh deploy nécessite re-run, set true
  # + helm-template extract ConfigMap + apply manuellement (ArgoCD hook
  # lifecycle race + ConfigMap deletion sur BeforeHookCreation policy).
  enabled: false

# ─── SeaweedFS — storage S3-compatible distribué (G57) ──────────────
# Sprint cluster-ready : pré-requis pour G58 (GWC S3 blobstore) puis
# G59 (coverage migration) puis G60 (3 replicas GS + JMS sync).
# Single-node homelab : master + volume + filer en 1 replica chacun.
# Bucket auto-créés via PostSync Job : maritime-gwc-tiles + maritime-coverage.
seaweedfs:
  enabled: true
  volumeSize: 100Gi
  # Creds S3 interne au cluster (jamais exposé internet, mais à override
  # via SealedSecret quand on aura un secrets-manager prod).
  s3AccessKey: maritime
  s3SecretKey: maritime-s3-homelab-2026

# ─── GWC S3 blobstore (G58) ─────────────────────────────────────────
# Configure GWC pour cacher les tuiles dans SeaweedFS bucket
# `maritime-gwc-tiles` au lieu de l'emptyDir per-pod. Pré-requis : G57
# déployé (filer S3 :8333 ready). Désactivé par défaut pour rollout
# progressif — enable une fois G57 stable.
gwcS3Blobstore:
  enabled: true

# ─── Coverage S3 migration (G59) ────────────────────────────────────
# Copie /coverage PVC → SeaweedFS bucket maritime-coverage + reconfigure
# CoverageStoreInfo url=s3://. Phase risquée data move. À enabler après
# backup PVC + G58 stable.
coverageS3Migration:
  enabled: false

# ─── GeoServer Hazelcast cluster (G60) ──────────────────────────────
# Active la synchro catalog cross-replica via Hazelcast K8s discovery
# (plugin gs-hz-cluster déjà baké dans l'image custom). Désactivé par
# défaut pour rollout progressif. Enable + bump replicas une fois G58
# (GWC S3) + G59 (coverage S3) validés sinon chaque replica re-cache
# à froid.
geoserverCluster:
  # G60 (2026-05-24) — Sprint cluster activé.
  # 2 replicas sur Mini-Blue 24GB RAM (3 = OOM avec heap 8g × 3 + overhead).
  # Heap réduit 8g→4g pour fit 2 replicas (4g+3g=7Gi × 2 = 14Gi, OK).
  # Quand migration Hetzner CAX41 32GB+ ou cluster multi-node, monter à 3+
  # et restorer heap 8g.
  enabled: true

# ─── GWC sat config (PostSync Job) ──────────────────────────────────
# Active le cache GWC sur les layers satellite avec TTL 1h + regex filter
# TIME pour cacher chaque jour scrubable. Évite le re-render à chaque
# requête WMS (sat = data immutable une fois publié) tout en gardant un
# recyclage proactif quand les granules sont supprimés via retention 7j.
gwcSatConfig:
  enabled: true

# ─── Contour SLD patch (PostSync Job) ───────────────────────────────
# Patche les SLDs *-contours-only pour qu'ils lisent ${env('stroke','#ffffff')}
# au lieu d'une couleur hardcodée. Fix bug "color picker isolignes sans effet"
# 2026-05-19. Idempotent (PUT ?raw=true).
contourSldPatch:
  enabled: true

# ─── Retention cleanup CronJob (-1j/+7j) ────────────────────────────
# TimescaleDB n'est pas installée sur ce cluster (add_retention_policy
# stub no-op), donc on fait le cleanup via un CronJob k8s quotidien à
# 03:30 UTC. Aligne les volumes sur la fenêtre time-bar UI.
retentionCleanup:
  enabled: true
