# Maritime services — preprod local k3s.
#
# Stateful deps (pg-catalog, pg-data, rmq) sont dans le chart maritime-stateful
# du même repo. Les Secrets CNPG `pg-data-app` et RMQ `rmq-default-user` sont
# auto-générés par les operators et référencés par les services ci-dessous.

services:
  # ─── API NestJS (core backend) ────────────────────────────────────
  api:
    enabled: true
    image: ghcr.io/sylad/maritime-api
    # v2-debian : base Debian bookworm-slim au lieu d'Alpine — fix
    # undici fetch() qui timeoutait sur Alpine 3.23 musl libc en HTTPS
    # externe (USGS, METAR, hubeau-débits, etc.). https.request() marche
    # mais le code utilise fetch() partout → seul recours : base glibc.
    tag: sha-4c4a077
    port: 3010
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }
    env:
      NODE_ENV: production
      PORT: "3010"
      CORS_ORIGIN: "https://maritime.dev.local"
      JWT_SECRET: dev-secret-change-me-in-prod
      JWT_EXPIRES_IN: "24h"
      GEOSERVER_URL: "http://geoserver:8080/geoserver"
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      GEOSERVER_WORKSPACE: maritime
      PALETTE_LIMIT_PER_USER: "5"
      ADMIN_EMAIL: sylvain.ladoire@gmail.com
      ADMIN_USERNAME: sylvain

  # ─── ais-ingester (aisstream.io WebSocket → publish RMQ ais.raw) ──
  # Source du flux AIS live. Secret K8s `maritime-shared-env` (créé hors
  # Git, voir HANDOFF.md) contient AISSTREAM_API_KEY + AIS_BBOX_* +
  # GEOSERVER_ADMIN_* + CANDHIS_API_KEY + GRIB_PARSER_URL.
  # v2-debian : base Debian (cf fix undici/Alpine).
  aisIngester:
    enabled: true
    image: ghcr.io/sylad/maritime-ais-ingester
    tag: v2-debian
    replicas: 1
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }
    env: {}  # BBox + AISSTREAM_API_KEY viennent du secret maritime-shared-env
    secretName: maritime-shared-env

  # ─── ais-decoder (consume RMQ → INSERT PG) ────────────────────────
  aisDecoder:
    enabled: true
    image: ghcr.io/sylad/maritime-ais-decoder
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── alerts-engine (consume RMQ + PG hypertable) ──────────────────
  alertsEngine:
    enabled: true
    image: ghcr.io/sylad/maritime-alerts-engine
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }
    env:
      WIND_SPEED_ALERT_THRESHOLD: "10"
      LIGHTNING_PROXIMITY_KM: "10"
      COOLDOWN_MIN: "30"

  # ─── track-builder (cron hourly) ──────────────────────────────────
  trackBuilder:
    enabled: true
    image: ghcr.io/sylad/maritime-track-builder
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── lightning-fetcher (WebSocket lightningmaps.org → RMQ) ────────
  # Stream live des éclairs en Europe. Single replica (WSS).
  # v2-debian : fix undici/Alpine.
  lightningFetcher:
    enabled: true
    image: ghcr.io/sylad/maritime-lightning-fetcher
    tag: v2-debian
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── buoy-fetcher (EMODnet WFS → seed bouées quotidien) ───────────
  # Cron quotidien 1440 min. Python 3.12-slim (glibc), pas concerné
  # par bug undici. Bbox Europe étroite par défaut côté code.
  buoyFetcher:
    enabled: true
    image: ghcr.io/sylad/maritime-buoy-fetcher
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── grib-parser (Python sidecar pour parser GRIB/NetCDF) ────────
  # Service HTTP appelé par maritime-api orchestrator pour décoder
  # les fichiers GRIB téléchargés par weather-fetcher*. Image GDAL
  # (osgeo/gdal base, ~700MB) — pas concerné par bug undici.
  gribParser:
    enabled: true
    image: ghcr.io/sylad/maritime-grib-parser
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── weather-fetcher (GFS wind + wave forecasts, cron 4x/jour) ────
  # Écrit GeoTIFF dans /coverage/wind-speed, /coverage/wave-hs,
  # /coverage/wave-dir partagé via hostPath /var/lib/maritime/coverage
  # (single-node k3s = hostPath OK, à industrialiser via RWX/SeaweedFS).
  weatherFetcher:
    enabled: true
    image: ghcr.io/sylad/maritime-weather-fetcher
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  weatherFetcherArpege:
    enabled: true
    image: ghcr.io/sylad/maritime-weather-fetcher-arpege
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  weatherFetcherArome:
    enabled: true
    image: ghcr.io/sylad/maritime-weather-fetcher-arome
    tag: v1
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }

  # ─── sst-fetcher (NOAA OISST cron 06:00 UTC) ──────────────────────
  # v2-prelim : fallback _preliminary.nc → URL fix pour les data <21j
  # (NOAA publie d'abord preliminary, finalise 14-21j plus tard).
  sstFetcher:
    enabled: true
    image: ghcr.io/sylad/maritime-sst-fetcher
    tag: v2-prelim
    replicas: 1
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

  # ─── GeoServer (cluster GIS) ──────────────────────────────────────
  # JDBCConfig pointe sur pg-catalog (175 rows déjà migrés depuis NAS).
  # PVC data_dir RWO single-replica preprod. Phase prod = StickySession + N replicas.
  geoserver:
    enabled: true
    image: ghcr.io/sylad/maritime-geoserver
    tag: v3-idw-fix   # fix ArrayIndexOutOfBoundsException EPSG:3857 (getSamples minX/minY)
    replicas: 1
    dataSize: 5Gi
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits:   { cpu: "2",    memory: "3Gi" }

  # ─── Frontend Angular SPA + nginx (AetherWX brand) ────────────────
  frontend:
    enabled: true
    image: ghcr.io/sylad/maritime-frontend
    tag: sha-ca78bf9   # geoJsonFmt lazy projection (fix wind arrows Lambert)
    replicas: 1
    port: 80
    resources:
      requests: { cpu: "10m",  memory: "16Mi" }
      limits:   { cpu: "100m", memory: "64Mi" }

ingress:
  host: maritime.dev.local
  className: nginx
  tls:
    enabled: true
    secretName: maritime-tls
  annotations:
    cert-manager.io/cluster-issuer: mkcert-ca-issuer
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

# ─── Storage partagé /coverage et /wind-arrows ──────────────────────
# Migré de hostPath → PVC RWX Longhorn (vague 2 industrialisation).
# Requiert Longhorn installé sur le cluster (cf bootstrap script).
coverage:
  enabled: true
  storageClass: longhorn
  coverageSize: 10Gi
  windArrowsSize: 2Gi
