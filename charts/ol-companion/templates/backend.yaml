apiVersion: apps/v1
kind: Deployment
metadata:
  name: ol-backend
  labels: { app: ol-backend }
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: ol-backend }
  template:
    metadata:
      labels: { app: ol-backend }
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: {{ .Values.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.secretName }}
                optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.backend.persistence.enabled }}
          persistentVolumeClaim:
            claimName: ol-backend-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ol-backend
spec:
  selector: { app: ol-backend }
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
{{- if .Values.backend.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ol-backend-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.backend.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
{{- end }}
