apiVersion: apps/v1
kind: Deployment
metadata:
  name: ol-frontend
  labels: { app: ol-frontend }
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels: { app: ol-frontend }
  template:
    metadata:
      labels: { app: ol-frontend }
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"
          imagePullPolicy: {{ .Values.frontend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ol-frontend
spec:
  selector: { app: ol-frontend }
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
