apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warhammer40k
  annotations:
    {{- range $k, $v := .Values.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # /api/* → backend (NestJS direct, pas via nginx frontend)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: warhammer-backend
                port:
                  number: {{ .Values.backend.port }}
          # Tout le reste → frontend (SPA + nginx)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: warhammer-frontend
                port:
                  number: 80
